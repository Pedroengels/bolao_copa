<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bolão · 2ª Fase — Copa 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Cinzel:wght@600;700;800;900&display=swap');
:root{--chalk:#f2e6c8;--gold:#f4c430;--gold-2:#fff3cf;--gold-deep:#a8791a;--cyan:#e8913a;--coral:#c4162a;--scarlet:#c4162a;--ink:#000;--muted:#8a7f66;--card:#0d0a06;--card-2:#141009;--border:rgba(244,196,48,.14);--border-2:rgba(244,196,48,.32);--exact:#f4c430;--result:#e8913a;--wrong:#3a1e1e}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{background:radial-gradient(1200px 600px at 50% -10%,rgba(244,196,48,.08),transparent 62%),#000;color:var(--chalk);font-family:'Archivo',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.wrap{max-width:1180px;margin:0 auto;padding:26px 20px 80px}
header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.brand{display:flex;flex-direction:column;gap:6px}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:500;opacity:.7}
.title{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:800;font-size:clamp(28px,5vw,46px);line-height:.95;letter-spacing:-.01em;margin:0;background:linear-gradient(180deg,#fff3cf 0%,var(--gold) 55%,var(--gold-deep) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 18px rgba(244,196,48,.28))}
.title .accent{color:var(--gold)}
.subtitle{color:var(--muted);font-size:14px;max-width:52ch}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.sync{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono';font-size:11px;color:var(--muted)}
.sync .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.sync.ok .dot{background:var(--gold);box-shadow:0 0 10px var(--gold)}
.sync.err .dot{background:var(--scarlet);box-shadow:0 0 10px var(--scarlet)}
.refresh-btn{background:transparent;border:1px solid var(--border-2);color:var(--gold);font-family:'JetBrains Mono';font-size:11px;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.15s}
.refresh-btn:hover{border-color:var(--gold);color:var(--gold-2);box-shadow:0 0 14px rgba(244,196,48,.35)}
.datasrc{background:rgba(244,196,48,.05);border:1px solid var(--border);border-radius:10px;padding:11px 15px;margin-bottom:22px;font-size:12.5px;color:var(--muted);display:flex;gap:10px;align-items:flex-start}
.datasrc b{color:var(--gold)}
.tabs{display:flex;gap:4px;margin-bottom:22px;flex-wrap:wrap;background:linear-gradient(180deg,#0d0a06,#050301);padding:5px;border-radius:12px;border:1px solid var(--border);width:fit-content;box-shadow:0 6px 26px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.03)}
.tab{background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:'Archivo',sans-serif;font-weight:600;font-size:14px;padding:9px 18px;border-radius:8px;transition:.15s;letter-spacing:.02em}
.tab:hover{color:var(--gold-2)}
.tab.active{background:linear-gradient(180deg,var(--gold-2),var(--gold) 55%,var(--gold-deep));color:#0b0805;box-shadow:0 0 20px rgba(244,196,48,.45),inset 0 1px 0 rgba(255,255,255,.5)}
/* ===== Sub-abas (dentro de Estatísticas) ===== */
.sub-tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;border-bottom:1px solid var(--border);padding-bottom:0}
.sub-tab{background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:'Archivo',sans-serif;font-weight:600;font-size:13px;padding:10px 16px;border-radius:8px 8px 0 0;transition:.15s;border-bottom:2px solid transparent;margin-bottom:-1px}
.sub-tab:hover{color:var(--chalk)}
.sub-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(245,197,24,.05)}

/* ===== Rei de cada fase (visual) ===== */
.kings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin:10px 0 8px}
.king-card{position:relative;background:linear-gradient(135deg,rgba(245,197,24,.12),rgba(245,197,24,.02));border:1px solid rgba(245,197,24,.25);border-radius:14px;padding:16px 18px;overflow:hidden}
.king-card::before{content:"👑";position:absolute;top:-8px;right:-6px;font-size:60px;opacity:.08;transform:rotate(15deg)}
.king-phase{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);font-weight:700;margin-bottom:8px}
.king-who{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:800;font-size:18px;color:var(--chalk);line-height:1.15;margin-bottom:4px}
.king-big{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:800;font-size:32px;color:var(--gold);line-height:1;margin-top:6px}
.king-big span{font-size:12px;color:var(--muted);font-weight:600;margin-left:4px;letter-spacing:.04em}
.king-meta{font-family:'JetBrains Mono';font-size:10.5px;color:var(--muted);margin-top:8px}
.king-meta b{color:var(--chalk);font-weight:700}

/* ===== Retrospectiva: barra empilhada de fases ===== */
.retro-phase-bar{margin:14px 0 22px}
.rpb-track{display:flex;height:44px;border-radius:10px;overflow:hidden;background:var(--card);border:1px solid var(--border)}
.rpb-seg{display:flex;align-items:center;justify-content:center;color:var(--ink);font-family:'JetBrains Mono';font-weight:700;font-size:12px;transition:.2s;min-width:0}
.rpb-seg:hover{filter:brightness(1.15)}
.rpb-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-family:'JetBrains Mono';font-size:11px;color:var(--muted)}
.rpb-legend span{display:inline-flex;align-items:center;gap:5px}
.rpb-legend .sw{width:10px;height:10px;border-radius:2px;display:inline-block}

/* ===== Highlights badges (mais compactos) ===== */
.retro-badges{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 20px}
.retro-badge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-family:'JetBrains Mono';font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.retro-badge b{color:var(--gold);font-weight:700}
.retro-badge .ico{font-size:14px}
.legend{display:none}
/* Landing mode: só o palco em cima, abas dentro do palco */
body.landing .wrap{padding-top:0}
body.landing #topHeader{display:none}
body.landing .foot{display:none}
.tabs-slot{position:relative;z-index:4;display:flex;justify-content:center;margin:-8px auto 24px;padding:0 20px;max-width:1180px}
.tabs-slot .tabs{background:rgba(15,10,4,.55);border:1px solid rgba(244,196,48,.18);box-shadow:0 6px 20px rgba(0,0,0,.5);padding:4px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.tabs-slot .tab{font-size:12.5px;padding:7px 14px;letter-spacing:.04em}
.tabs-slot .tab.active{box-shadow:0 0 14px rgba(244,196,48,.4)}
body.landing .stage{margin-top:0;border-top:none;border-radius:0}
.legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
.legend b{color:var(--chalk)}
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:26px;align-items:end}
.pod{background:linear-gradient(180deg,var(--card-2),var(--card));border:1px solid var(--border);border-radius:16px;padding:22px 18px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:4px;
  box-shadow:0 6px 22px rgba(0,0,0,.28);animation:podIn .7s cubic-bezier(.2,.85,.25,1) backwards;transition:transform .18s}
@keyframes podIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.pod:hover{transform:translateY(-3px)}
.pod.p1{animation-delay:.05s;padding:30px 20px 26px;border-color:rgba(245,197,24,.45);
  background:linear-gradient(180deg,rgba(245,197,24,.16),rgba(245,197,24,.04) 55%,var(--card));
  box-shadow:0 0 34px rgba(245,197,24,.22),0 8px 26px rgba(0,0,0,.34)}
.pod.p2{animation-delay:.16s;background:linear-gradient(180deg,rgba(205,216,210,.08),var(--card))}
.pod.p3{animation-delay:.27s;background:linear-gradient(180deg,rgba(201,138,75,.08),var(--card))}
.pod::before{content:"";position:absolute;inset:0 0 auto 0;height:4px}
.pod.p1::before{background:linear-gradient(90deg,#c9a01a,var(--gold),#fff1b8,var(--gold),#c9a01a);box-shadow:0 0 14px rgba(245,197,24,.75)}
.pod.p2::before{background:linear-gradient(90deg,#8d9691,#cdd8d2,#f2f7f4,#cdd8d2,#8d9691)}
.pod.p3::before{background:linear-gradient(90deg,#8a5c31,#c98a4b,#e8b380,#c98a4b,#8a5c31)}
.pod.p1::after{content:"";position:absolute;top:-60%;left:-40%;width:45%;height:220%;transform:rotate(20deg);pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent);animation:podShine 5s ease-in-out infinite}
@keyframes podShine{0%{left:-40%}55%,100%{left:140%}}
.pod .rank{font-family:'Archivo Expanded';font-weight:800;font-size:13px;letter-spacing:.1em;color:var(--muted)}
.pod.p1 .rank{color:var(--gold);text-shadow:0 0 12px rgba(245,197,24,.5)}
.pod .who{font-family:'Archivo Expanded';font-weight:800;font-size:clamp(17px,2.4vw,23px);letter-spacing:-.01em;line-height:1.05}
.pod.p1 .who{font-size:clamp(20px,3vw,28px);color:var(--gold);text-shadow:0 2px 18px rgba(245,197,24,.35)}
.pod .pts{font-family:'JetBrains Mono';font-size:12px;color:var(--muted);margin-top:6px}
.pod .pts b{color:var(--chalk);font-size:26px;font-weight:700}
.pod.p1 .pts b{color:var(--gold);font-size:32px;text-shadow:0 0 20px rgba(245,197,24,.4)}
.pod .crown{position:absolute;top:14px;right:16px;font-size:22px}
.pod.p1 .crown{font-size:30px;filter:drop-shadow(0 0 10px rgba(245,197,24,.8));animation:crownFloat 3s ease-in-out infinite}
@keyframes crownFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-4px) rotate(-6deg)}}
@media(max-width:640px){.podium{grid-template-columns:1fr}.pod.p1{padding:24px 18px}}
.featured{background:linear-gradient(135deg,rgba(79,214,201,.10),rgba(245,197,24,.06));border:1px solid var(--border-2);border-radius:16px;padding:18px 20px;margin-bottom:22px;position:relative;overflow:hidden}
.featured::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--gold))}
.fx-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.fx-badge{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:7px}
.fx-badge.live{background:rgba(255,107,94,.16);color:var(--coral)}
.fx-badge.next{background:rgba(79,214,201,.16);color:var(--cyan)}
.fx-badge.last{background:rgba(245,197,24,.14);color:var(--gold)}
.fx-badge .pulse{width:8px;height:8px;border-radius:50%;background:var(--coral);animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,107,94,.6)}70%{box-shadow:0 0 0 7px rgba(255,107,94,0)}100%{box-shadow:0 0 0 0 rgba(255,107,94,0)}}
.fx-meta{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);letter-spacing:.04em}
.fx-teams{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center}
.fx-team{display:flex;align-items:center;gap:11px;min-width:0}
.fx-team.right{justify-content:flex-end}
.fx-flag{font-size:30px;flex-shrink:0}
.fx-name{font-family:'Archivo Expanded';font-weight:800;font-size:clamp(15px,2.5vw,21px);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fx-name.label{font-family:'Archivo';font-weight:500;font-style:italic;font-size:14px;color:var(--muted)}
.fx-score{font-family:'JetBrains Mono';font-weight:700;font-size:26px;color:var(--gold);white-space:nowrap}
.fx-x{color:var(--muted);font-size:18px;margin:0 2px}
.fx-pen{text-align:center;font-family:'JetBrains Mono';font-size:11px;color:var(--cyan);margin-top:10px}
table.board{width:100%;border-collapse:collapse;font-size:14px}
table.board th{text-align:left;font-family:'JetBrains Mono',monospace;font-weight:500;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--border-2)}
table.board th.num,table.board td.num{text-align:right;font-variant-numeric:tabular-nums}
table.board td{padding:12px;border-bottom:1px solid var(--border)}
table.board tr:hover td{background:rgba(255,255,255,.02)}
.pos{font-family:'JetBrains Mono';font-weight:700;color:var(--muted);width:30px}
.pos.top{color:var(--gold)}
.name-cell{font-weight:600}
.total{font-family:'JetBrains Mono';font-weight:700;font-size:16px;color:var(--gold)}
.board tr.bottom td{background:rgba(255,107,94,.06)}
.board tr.bottom:hover td{background:rgba(255,107,94,.11)}
.pos.bad{color:var(--coral)}
.total.bad{color:var(--coral)}
.bar-bad{background:linear-gradient(90deg,#7a2d28,var(--coral))!important}
.lanterna{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,rgba(255,107,94,.12),rgba(255,107,94,.04));border:1px solid rgba(255,107,94,.3);border-radius:14px;padding:14px 18px}
.lanterna-row td{border-bottom:none!important;padding:6px 12px 12px!important}
.lant-pos{font-family:'JetBrains Mono';font-weight:700;font-size:18px;color:var(--coral);min-width:34px;text-align:center;flex-shrink:0}
.lant-left{display:flex;flex-direction:column;gap:3px;flex:1}
.lant-emoji{font-size:30px;flex-shrink:0}
/* ===== Card do campeão ===== */
.champ-card{position:relative;background:radial-gradient(120% 140% at 50% 0%,rgba(245,197,24,.28),rgba(245,197,24,.05) 55%,rgba(245,197,24,.02));border:2px solid var(--gold);border-radius:18px;padding:32px 28px 28px;margin-bottom:22px;overflow:hidden;text-align:center;
  box-shadow:0 0 50px rgba(245,197,24,.28),0 10px 34px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.18);
  animation:champIn .9s cubic-bezier(.2,.85,.25,1) backwards,champPulse 4s ease-in-out infinite 1s}
@keyframes champIn{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes champPulse{0%,100%{box-shadow:0 0 50px rgba(245,197,24,.28),0 10px 34px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.18)}50%{box-shadow:0 0 76px rgba(245,197,24,.45),0 10px 34px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.18)}}
.champ-shine{position:absolute;top:-50%;left:-30%;width:60%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:rotate(20deg);animation:shine 4s infinite}
@keyframes shine{0%{left:-30%}100%{left:130%}}
.champ-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:8px;position:relative;z-index:1}
.champ-tag{font-family:'JetBrains Mono';font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--gold)}
.champ-year{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);letter-spacing:.06em}
.champ-name{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:800;font-size:clamp(30px,5.6vw,52px);letter-spacing:-.02em;line-height:1.05;margin:10px 0 14px;position:relative;z-index:1;
  background:linear-gradient(180deg,#fff6d0 0%,var(--gold) 45%,#c9a01a 100%);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 2px 20px rgba(245,197,24,.45))}
.champ-stats{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;font-family:'JetBrains Mono';font-size:12.5px;color:var(--chalk);position:relative;z-index:1}
.champ-stats b{color:var(--gold);font-weight:700}
.champ-gap{color:var(--cyan)}
.champ-conf{font-size:24px;margin-top:16px;letter-spacing:10px;position:relative;z-index:1;animation:confBob 2.6s ease-in-out infinite}
@keyframes confBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ===== Ranking: o palco (visual de premiação) ===== */
.stage{position:relative;left:50%;margin-left:-50vw;margin-right:-50vw;width:100vw;max-width:100vw;
  background:#000;border-top:1px solid rgba(244,196,48,.16);border-bottom:1px solid rgba(244,196,48,.16);
  padding:42px 0 26px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.05)}
.stage::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(70% 80% at 0% -10%,rgba(255,214,130,.42),rgba(255,180,60,.16) 30%,transparent 60%),
    radial-gradient(70% 80% at 100% 110%,rgba(196,22,42,.45),rgba(220,60,50,.18) 28%,transparent 60%);
  mix-blend-mode:screen}
.stage::after{content:"";position:absolute;left:0;right:0;bottom:0;height:180px;pointer-events:none;z-index:2;
  background:linear-gradient(180deg,transparent,rgba(120,10,20,.35) 55%,rgba(0,0,0,.9))}
.stage-head{position:relative;z-index:4;display:flex;align-items:center;gap:18px;margin:0 auto 22px;padding:0 30px;max-width:1180px}
.stage-rule{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(244,196,48,.45),transparent)}
.stage-title{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:800;font-size:clamp(13px,1.7vw,18px);letter-spacing:.34em;text-transform:uppercase;white-space:nowrap;
  background:linear-gradient(180deg,#fff3cf,#f4c430 55%,#a8791a);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 16px rgba(244,196,48,.4))}
.stage-sub{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.24em;text-transform:uppercase;color:rgba(244,196,48,.42);white-space:nowrap}
.stage-scroll{position:relative;z-index:1;overflow-x:auto;overflow-y:hidden;padding:0 30px 6px}
.stage-scroll::-webkit-scrollbar{height:7px}
.stage-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,.04)}
.stage-scroll::-webkit-scrollbar-thumb{background:rgba(244,196,48,.3);border-radius:4px}
.stage-bars{position:relative;display:flex;align-items:stretch;gap:16px;height:720px;min-width:2600px;padding-top:100px}
.stage-bars::after{content:"";position:absolute;left:0;right:0;bottom:180px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(244,196,48,.5) 8%,rgba(244,196,48,.5) 92%,transparent)}
.sb{position:relative;flex:0 0 116px;display:flex;flex-direction:column;z-index:1}
.sb.podium1 .sb-pos-top{font-size:64px}
.sb.podium2 .sb-pos-top{font-size:52px}
.sb.podium3 .sb-pos-top{font-size:44px}
.sb-plot{position:relative;flex:1 1 auto;min-height:0}
/* feixe de luz sobre a barra — discreto */
.sb-beam{position:absolute;left:50%;bottom:var(--h);width:150%;height:78px;transform:translateX(-50%);pointer-events:none;
  background:radial-gradient(ellipse 50% 100% at 50% 100%,var(--beam),transparent 74%);
  filter:blur(5px);animation:beamIn 1.6s ease-out backwards;animation-delay:calc(var(--i)*70ms + .55s)}
@keyframes beamIn{from{opacity:0}to{opacity:1}}
.sb-pos-top{position:absolute;left:-14px;right:-14px;bottom:calc(var(--h) + 14px);text-align:center;
  font-family:'Cinzel','Playfair Display',Georgia,serif;font-weight:800;font-size:32px;line-height:1;
  letter-spacing:.02em;color:var(--c-top);
  text-shadow:0 0 calc(6px + 20px*var(--glow)) var(--halo),0 2px 0 rgba(0,0,0,.35);
  animation:valIn .7s ease-out backwards;animation-delay:calc(var(--i)*70ms + .75s)}
.sb-ord{font-size:.48em;font-weight:700;margin-left:.05em;vertical-align:.55em;letter-spacing:.02em;opacity:.85}
@keyframes valIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sb.first .sb-pos-top{font-size:70px}
/* a coluna: metal polido, ouro → escarlate conforme a posição */
.sb-col{position:absolute;left:0;right:0;bottom:0;height:var(--h);border-radius:6px 6px 0 0;overflow:hidden;
  background:linear-gradient(180deg,var(--c-top) 0%,var(--c) 42%,var(--c-bot) 100%);
  box-shadow:0 0 calc(10px + 30px*var(--glow)) var(--halo),inset 0 1px 0 rgba(255,255,255,.55);
  transform-origin:bottom;animation:stageRise 1.15s cubic-bezier(.16,1,.3,1) backwards;animation-delay:calc(var(--i)*70ms);transition:filter .2s}
/* brilho cilíndrico, como uma estatueta */
.sb-col::before{content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,.42) 0%,rgba(0,0,0,.05) 22%,rgba(255,255,255,.34) 47%,rgba(255,255,255,.06) 62%,rgba(0,0,0,.38) 100%)}
@keyframes stageRise{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.sb:hover .sb-col{filter:brightness(1.22) saturate(1.1)}
/* reflexo no piso do palco */
.sb-foot{position:relative;flex:0 0 180px;height:180px;display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:14px;box-sizing:border-box}
.sb-refl{position:absolute;top:1px;left:0;right:0;height:64px;pointer-events:none;border-radius:0 0 5px 5px;
  background:linear-gradient(180deg,var(--refl),transparent 82%);opacity:.18;filter:blur(1px)}
.sb-val-bot{position:relative;font-family:'JetBrains Mono';font-size:13px;font-weight:700;letter-spacing:.02em;color:rgba(244,196,48,.75);display:inline-flex;align-items:baseline;gap:3px}

  letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-height:150px;
  color:rgba(255,255,255,calc(.3 + .55*var(--glow)))}
.sb.first .sb-name{font-weight:800;color:#fff;text-shadow:0 0 12px rgba(244,196,48,.5)}
.sb.podium1 .sb-name{font-size:15px;font-weight:800;color:#fff;letter-spacing:.14em;max-height:160px}
.sb.podium2 .sb-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.9);letter-spacing:.12em;max-height:155px}
.sb.podium3 .sb-name{font-size:12.5px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.12em;max-height:152px}
.sb.podium1 .sb-val-bot,.sb.podium2 .sb-val-bot,.sb.podium3 .sb-val-bot{font-size:15px;color:var(--gold);text-shadow:0 0 10px rgba(244,196,48,.55)}
/* ===== confetes ===== */
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.confetti.back{z-index:0}
.confetti.front{z-index:3;filter:blur(.6px)}
.cf{position:absolute;top:-24px;width:var(--w);height:var(--hh);background:var(--col);border-radius:var(--br);opacity:0;
  animation:cfFall var(--d) linear var(--dl) infinite;will-change:transform}
@keyframes cfFall{
  0%{transform:translate3d(0,-24px,0) rotate(var(--rot));opacity:0}
  7%{opacity:.95}
  88%{opacity:.7}
  100%{transform:translate3d(var(--dx),820px,0) rotate(calc(var(--rot) + var(--spin)));opacity:0}}
@media(max-width:640px){.stage{padding:30px 0 18px}.stage-head{padding:0 16px;gap:12px}.stage-title{letter-spacing:.2em}.stage-sub{display:none}.stage-scroll{padding:0 16px 6px}}
.stage{margin-bottom:30px}

/* ===== Ranking clássico: gráfico de barras ===== */
.rank-chart{margin-top:22px;background:linear-gradient(180deg,rgba(255,255,255,.028),rgba(255,255,255,0));border:1px solid var(--border);border-radius:16px;padding:18px 18px 14px}
.rc-title{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:14px}

.rc-s{font-family:'JetBrains Mono';font-size:11px;color:var(--muted)}
.rc-scroll{overflow-x:auto;overflow-y:hidden;padding-bottom:4px}
.rc-bars{position:relative;display:flex;align-items:stretch;gap:9px;height:400px;min-width:820px;padding-top:44px}
.rc-bars::before{content:"";position:absolute;left:0;right:0;top:44px;bottom:100px;pointer-events:none;
  background:repeating-linear-gradient(to top,rgba(255,255,255,.05) 0 1px,transparent 1px 25%)}
.rc-bars::after{content:"";position:absolute;left:0;right:0;bottom:100px;height:1px;background:rgba(255,255,255,.16)}
.rb{position:relative;flex:1 1 0;min-width:32px;display:flex;flex-direction:column;z-index:1}
.rb-plot{position:relative;flex:1 1 auto;min-height:0}
.rb-head{position:absolute;left:0;right:0;bottom:calc(var(--h) + 7px);text-align:center;line-height:1.15}
.rb-medal{display:block;font-size:15px;filter:drop-shadow(0 0 6px rgba(245,197,24,calc(.7*var(--glow))))}
.rb-val{font-family:'JetBrains Mono';font-weight:700;font-size:13px;color:var(--c);text-shadow:0 0 calc(12px*var(--glow)) rgba(245,197,24,var(--glow))}
.rb-col{position:absolute;left:0;right:0;bottom:0;height:var(--h);border-radius:8px 8px 3px 3px;overflow:hidden;
  background:linear-gradient(180deg,var(--c-top) 0%,var(--c) 48%,var(--c-bot) 100%);
  box-shadow:0 0 calc(22px*var(--glow)) rgba(245,197,24,calc(.5*var(--glow))),inset 0 1px 0 rgba(255,255,255,.4),0 2px 10px rgba(0,0,0,.35);
  transform-origin:bottom;animation:rbGrow .9s cubic-bezier(.2,.85,.25,1) backwards;animation-delay:calc(var(--i)*45ms);transition:filter .15s}
@keyframes rbGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.rb:hover .rb-col{filter:brightness(1.18)}
.rb.top3 .rb-col::after{content:"";position:absolute;inset:0;
  background:linear-gradient(115deg,transparent 32%,rgba(255,255,255,.55) 50%,transparent 68%);
  animation:rbShine 3.4s ease-in-out infinite;animation-delay:calc(var(--i)*.45s)}
@keyframes rbShine{0%{transform:translateY(115%)}50%,100%{transform:translateY(-115%)}}
.rb-foot{flex:0 0 100px;height:100px;display:flex;flex-direction:column;align-items:center;gap:5px;padding-top:9px;box-sizing:border-box}
.rb-pos{font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:var(--muted)}

.rb-name{writing-mode:vertical-rl;transform:rotate(180deg);font-size:10.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-height:78px;color:var(--muted);letter-spacing:.01em}
.rb.top3 .rb-name{color:var(--chalk);font-weight:800}
.rb.last .rb-name{color:var(--coral)}
.rc-legend{display:flex;align-items:center;gap:7px;margin-top:12px;font-family:'JetBrains Mono';font-size:10.5px;color:var(--muted)}
.rc-sw{width:22px;height:9px;border-radius:3px;display:inline-block}

.rc-sw.red{background:linear-gradient(90deg,#FF6B5E,#ff9188)}

/* ===== Rei de cada fase ===== */
.king-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;align-items:center;padding:8px 4px;border-bottom:1px dashed var(--border)}

/* ===== Jogo decisivo ===== */

/* ===== Tabela cruzada ===== */
.xt-wrap{overflow-x:auto;margin-top:8px;border:1px solid var(--border);border-radius:8px}
.xt{border-collapse:collapse;font-family:'JetBrains Mono';font-size:11.5px;min-width:100%}

.xt-legend{font-family:'JetBrains Mono';font-size:10.5px;color:var(--muted);margin:8px 0}
.xt-legend .xt-exact{color:var(--gold)} .xt-legend .xt-hit{color:var(--cyan)} .xt-legend .xt-miss{color:var(--coral)} .xt-legend .xt-empty{color:var(--muted)}

/* ===== Retrospectiva ===== */

.retro-tl{border:1px solid var(--border);border-radius:9px;padding:10px 12px;background:var(--card)}

.retro-tl .tl-j{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}

.retro-tl .tl-scores{display:flex;gap:12px;font-family:'JetBrains Mono';font-size:11px;color:var(--muted)}

.retro-tl .tl-verdict{font-family:'JetBrains Mono';font-size:10.5px;margin-top:6px;color:var(--muted)}
.retro-tl.ok .tl-verdict{color:var(--gold)}
.retro-tl.partial .tl-verdict{color:var(--cyan)}
.palp-warn{background:rgba(255,197,24,.08);border:1px solid rgba(245,197,24,.3);border-radius:12px;padding:16px 18px;color:var(--muted);font-size:13.5px}
.palp-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.palp-label{display:block;font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.palp-whorow{display:flex;align-items:center;gap:14px;flex-wrap:wrap}

.palp-adv{margin-top:9px;font-family:'JetBrains Mono';font-size:11.5px;color:var(--muted)}

@media(max-width:640px){.palp-grid{grid-template-columns:1fr}}
.lant-badge{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--coral)}
.lant-name{font-family:'Archivo Expanded';font-weight:800;font-size:clamp(17px,2.4vw,22px);letter-spacing:-.01em}

.round-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:9px;cursor:pointer;font-weight:600;font-size:13px;transition:.15s}

.match{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:12px}

.status{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:3px 9px;border-radius:20px}

.vs{font-family:'JetBrains Mono';color:var(--muted);font-size:12px}
.pen-note{text-align:center;font-family:'JetBrains Mono';font-size:11px;color:var(--cyan);margin-top:2px}

.picks-acc{margin-top:14px;border-top:1px dashed var(--border);padding-top:8px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.stat-card .k{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-card .v{font-family:'Archivo Expanded';font-weight:800;font-size:30px;line-height:1;color:var(--gold)}
.stat-card .v.cyan{color:var(--cyan)}
.stat-card .sub{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);margin-top:6px}
.stat-block{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.stat-block h3{margin:0 0 14px;font-family:'Archivo Expanded';font-weight:700;font-size:15px;letter-spacing:.01em}
.stat-block h3 .hint{font-family:'JetBrains Mono';font-size:10px;color:var(--muted);font-weight:400;letter-spacing:.08em;margin-left:8px;text-transform:uppercase}
.hbar{display:grid;grid-template-columns:150px 1fr 44px;gap:10px;align-items:center;margin-bottom:8px;font-size:13px}
.hbar .lbl{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar .track{height:20px;border-radius:6px;background:rgba(255,255,255,.05);overflow:hidden}
.hbar .track > span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--gold));border-radius:6px}
.hbar .val{font-family:'JetBrains Mono';font-weight:700;text-align:right;color:var(--gold)}
.consensus{display:grid;grid-template-columns:1fr auto;gap:8px;padding:9px 10px;border-radius:8px;font-size:13px;align-items:center}
.consensus:hover{background:rgba(255,255,255,.02)}
.consensus .game{color:var(--muted);font-family:'JetBrains Mono';font-size:11.5px}
.consensus .pop{font-weight:600}
.consensus .pct{font-family:'JetBrains Mono';font-weight:700;color:var(--cyan);text-align:right}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.duo-item{border-radius:10px;padding:12px 14px;border:1px solid var(--border)}
.duo-item.hard{background:rgba(255,107,94,.07)}
.duo-item.easy{background:rgba(79,214,201,.07)}
.duo-item .duo-k{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.duo-item .duo-g{font-weight:700;font-size:14px;margin-bottom:3px}
.duo-item .duo-v{font-family:'JetBrains Mono';font-size:11.5px;color:var(--muted)}
@media(max-width:640px){.duo{grid-template-columns:1fr}}
.section-label{font-family:'Archivo Expanded';font-weight:700;font-size:13px;letter-spacing:.02em;margin:22px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-label.pos{color:var(--gold)}
.section-label.neg{color:#7fa8d6}
.hbar .track-cold{display:block;height:100%;background:linear-gradient(90deg,#3a5a7a,#6b8fb5);border-radius:6px}
.hbar .val.cold{color:#8fb0d6}
/* bracket */
.bracket-scroll{overflow-x:auto;padding-bottom:16px}
.bracket{display:flex;gap:22px;min-width:1050px;align-items:stretch}
.bcol{display:flex;flex-direction:column;justify-content:space-around;flex:1;min-width:180px;gap:12px}
.bcol h4{margin:0 0 4px;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);text-align:center}
.btie{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:12.5px}
.btie.done{border-color:rgba(245,197,24,.3)}
.btie .brow{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:3px 0}
.btie .bteam{display:flex;align-items:center;gap:6px;min-width:0}
.btie .bteam .fl{font-size:14px;flex-shrink:0}
.btie .bteam .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.btie .bteam.win .nm{color:var(--gold)}
.btie .bteam.lose .nm{color:var(--muted);opacity:.65}
.btie .bg{font-family:'JetBrains Mono';font-weight:700;color:var(--muted);flex-shrink:0}
.btie .bteam.win + .bg,.btie .brow.win .bg{color:var(--gold)}
.btie .jn{font-family:'JetBrains Mono';font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase}
.btie .pen{font-family:'JetBrains Mono';font-size:9.5px;color:var(--cyan);text-align:center;margin-top:3px}
.bcol.final-col{justify-content:center}
.champ{background:linear-gradient(180deg,var(--card-2),var(--card));border:1px solid rgba(245,197,24,.4);border-radius:12px;padding:16px;text-align:center;margin-top:12px}
.champ .k{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.champ .who{font-family:'Archivo Expanded';font-weight:800;font-size:18px;color:var(--gold);margin-top:6px}
/* bracket editável de palpites */
.pbracket{display:flex;gap:20px;min-width:1000px;align-items:stretch}
.pcol{display:flex;flex-direction:column;justify-content:space-around;flex:1;min-width:190px;gap:12px}
.pcol h4{margin:0 0 4px;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);text-align:center}
.pcol.final-col{justify-content:center}
.ptie{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.ptie.decided{border-color:rgba(245,197,24,.28)}
.ptie.locked{opacity:.6}
.pt-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.pt-jn{font-family:'JetBrains Mono';font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.pt-status{font-family:'JetBrains Mono';font-size:9px}
.pt-status.ok{color:var(--cyan)} .pt-status.err{color:var(--coral)}
.pt-lock{font-size:11px}
.pt-side{display:grid;grid-template-columns:18px 1fr 34px;gap:6px;align-items:center;padding:3px 0}
.pt-side.win .pt-nm{color:var(--gold);font-weight:700}
.pt-fl{font-size:15px;text-align:center}
.pt-nm{font-weight:600;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pt-nm.lbl{font-weight:500;font-style:italic;color:var(--muted);font-size:11.5px}
.pt-in{width:34px;text-align:center;background:var(--ink);border:1px solid var(--border-2);color:var(--gold);font-family:'JetBrains Mono';font-weight:700;font-size:15px;border-radius:7px;padding:4px 0}
.pt-in:focus{outline:2px solid var(--cyan);border-color:var(--cyan)}
.pt-in:disabled{opacity:.5;cursor:not-allowed}
.pt-pen{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:7px;padding-top:7px;border-top:1px dashed var(--border)}
.pt-pen-lbl{font-family:'JetBrains Mono';font-size:9.5px;color:var(--cyan);text-transform:uppercase;letter-spacing:.08em}
.pt-pen-btn{background:var(--ink);border:1px solid var(--border-2);color:var(--muted);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:'Archivo';font-weight:600;font-size:11px;transition:.15s}
.pt-pen-btn:hover{border-color:var(--gold);color:var(--chalk)}
.pt-pen-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.1)}
.pt-foot{display:flex;align-items:center;gap:8px;margin-top:9px;padding-top:8px;border-top:1px dashed var(--border)}
.pt-save{background:var(--cyan);border:none;color:var(--ink);font-family:'Archivo';font-weight:700;font-size:12px;padding:5px 14px;border-radius:7px;cursor:pointer;transition:.15s}
.pt-save:hover{filter:brightness(1.1)}
.pt-save.disabled,.pt-save:disabled{background:var(--border-2);color:var(--muted);cursor:not-allowed;font-size:10.5px;font-weight:600}
.pt-lockmsg{font-family:'JetBrains Mono';font-size:10px;color:var(--muted);letter-spacing:.05em}
.pt-badge{font-family:'JetBrains Mono';font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:10px;font-weight:700}
.pt-badge.inh{background:rgba(245,197,24,.14);color:var(--gold)}
.pt-badge.rl{background:rgba(79,214,201,.14);color:var(--cyan)}
.pt-champ{background:linear-gradient(180deg,var(--card-2),var(--card));border:1px solid rgba(245,197,24,.4);border-radius:11px;padding:14px;text-align:center;margin-bottom:12px}
.pt-champ .k{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.pt-champ .who{font-family:'Archivo Expanded';font-weight:800;font-size:16px;color:var(--gold);margin-top:5px}
.palp-savebar{margin-bottom:14px}
.palp-savemsg{font-family:'JetBrains Mono';font-size:11.5px;color:var(--muted)}
.palp-savemsg.ok{color:var(--cyan)} .palp-savemsg.err{color:var(--coral)}
.empty{color:var(--muted);text-align:center;padding:30px;font-style:italic}
.foot{margin-top:30px;text-align:center;font-family:'JetBrains Mono';font-size:11px;color:var(--muted)}
@media(max-width:640px){.podium{grid-template-columns:1fr}.pick-row{grid-template-columns:1fr auto}table.board .hide-sm{display:none}.hbar{grid-template-columns:110px 1fr 40px}}
</style>

function num(x){if(x==null)return null;const s=String(x).trim();if(s==='')return null;const n=parseInt(s,10);return isNaN(n)?null:n;}
// Splits one CSV line honoring quoted fields (gviz wraps every value in "quotes")
function splitCSVLine(line){
  const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(q){
      if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; }
      else cur+=ch;
    }else{
      if(ch==='"')q=true;
      else if(ch===',')  {out.push(cur);cur='';}
      else cur+=ch;
    }
  }
  out.push(cur);
  return out.map(s=>s.trim());
}
function parseCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim()!=='');
  if(!lines.length)return[];
  const head=splitCSVLine(lines[0]).map(h=>h.toLowerCase());
  const iJ=head.indexOf('jogo'),iG1=head.indexOf('gol1'),iG2=head.indexOf('gol2'),iP=head.indexOf('pen');
  if(iJ<0||iG1<0||iG2<0)return[];
  const out=[];
  for(let k=1;k<lines.length;k++){
    const c=splitCSVLine(lines[k]);
    const jogo=num(c[iJ]);if(jogo==null)continue;
    out.push({jogo,gol1:num(c[iG1]),gol2:num(c[iG2]),pen:(iP>=0&&c[iP]?c[iP].trim():'')||null});
  }
  return out;
}

async function fetchResults(){

      if(!off[j])off[j]={sel1:null,sel2:null,gol1:null,gol2:null,pen:null};
      off[j].gol1=row.gol1;off[j].gol2=row.gol2;

// Lê a aba "Palpites" (via Apps Script GET) e sobrepõe os palpites do xlsx.
async function fetchPicksFromSheet(){
  if(!PICKS_ENABLED()) return;
  const r=await fetch(PICKS_API,{cache:'no-store',redirect:'follow'});
  if(!r.ok) throw new Error('picks HTTP '+r.status);
  const data=await r.json();
  if(!data.ok || !Array.isArray(data.picks)) return;
  for(const pk of data.picks){
    const p=pk.participante, j=String(pk.jogo);
    if(!p || !parts[p]) continue;
    if(pk.gol1==null || pk.gol2==null) continue;
    if(!parts[p][j]) parts[p][j]={sel1:null,sel2:null,gol1:null,gol2:null};
    parts[p][j].gol1=pk.gol1; parts[p][j].gol2=pk.gol2;
    parts[p][j].pen=(pk.pen==='sel1'||pk.pen==='sel2')?pk.pen:null;
    parts[p][j].saved=true; // veio do Sheets = já salvo, então já vem travado
  }
}

async function savePick(participante, jogo, gol1, gol2, pen){

  const r=await fetch(PICKS_API,{

    headers:{'Content-Type':'text/plain;charset=utf-8'}, // text/plain evita preflight CORS

}

function outcome(a,b){if(a==null||b==null)return null;return a>b?"H":a<b?"A":"D";}
function scorePick(pick,o){
  if(!o||o.gol1==null||o.gol2==null) return {pts:0,tag:"",state:"pending"};
  if(!pick||pick.gol1==null||pick.gol2==null) return {pts:0,tag:"—",state:"nopick"};
  if(pick.gol1===o.gol1&&pick.gol2===o.gol2) return {pts:EXACT_PTS,tag:"exato",state:"exact"};
  if(outcome(pick.gol1,pick.gol2)===outcome(o.gol1,o.gol2)) return {pts:RESULT_PTS,tag:"acertou",state:"result"};
  return {pts:0,tag:"",state:"wrong"};
}

function r32Teams(j){const g=games.find(x=>x.jogo===j);return g?teamsFor(g):[null,null];}
// winner/loser of a game id, resolving recursively through the bracket
function resolveSlot(slot){
  if(!slot)return null;
  if(slot.team)return slot.team;
  const j=slot.win||slot.lose||slot.winner;
  if(j==null)return null;
  const o=off[String(j)];
  if(!o||o.gol1==null||o.gol2==null)return null;
  const [h,a]=bracketTeams(j);
  if(!h||!a)return null;
  let winner,loser;
  if(o.gol1>o.gol2){winner=h;loser=a;}
  else if(o.gol2>o.gol1){winner=a;loser=h;}
  else{ // draw -> penalties
    if(o.pen==='sel1'){winner=h;loser=a;}
    else if(o.pen==='sel2'){winner=a;loser=h;}
    else return null; // undecided
  }
  return (slot.lose)?loser:winner;
}
// teams for any game id (R32 base or bracket feed)
function bracketTeams(j){
  j=Number(j);
  if(j>=73&&j<=88)return r32Teams(j);
  const b=BR[String(j)];
  if(!b)return[null,null];
  return[resolveSlot(b.home),resolveSlot(b.away)];
}
// human label for an undecided slot, e.g. "Venc. Jogo 74" / "Perd. Jogo 101"
function slotLabel(slot){
  if(!slot)return null;
  if(slot.team)return slot.team;
  if(slot.win!=null)return "Venc. Jogo "+slot.win;
  if(slot.lose!=null)return "Perd. Jogo "+slot.lose;
  return null;
}
// display teams for the Results tab: real team when decided, else the label.
// Never falls back to random participant picks for knockout games.
function displayTeams(g){
  const j=Number(g.jogo);
  if(j>=73&&j<=88)return teamsFor(g);            // R32: real matchups
  const b=BR[String(j)];if(!b)return[null,null];
  const t1=resolveSlot(b.home)||slotLabel(b.home);
  const t2=resolveSlot(b.away)||slotLabel(b.away);
  return[t1,t2];
}
// true only when a slot resolved to a real qualified team (not a label)
function isRealTeam(name){return !!name && !/^(Venc|Perd)\. Jogo/.test(name);}

// ---- CHAVE PESSOAL: resolve o bracket a partir dos palpites de UM participante ----
// Quem o participante 'p' acha que vence o jogo j. Para 73-88 (já jogados) usa o resultado oficial.
function pickWinner(p, j){
  j=Number(j);
  // 32-avos já aconteceram: quem avança é o vencedor REAL (via bracket oficial)
  if(j>=73&&j<=88){
    return resolveSlot({win:j});
  }
  const [h,a]=pickTeams(p,j);
  if(!h||!a) return null;
  const pk=parts[p]?.[j];
  if(!pk || pk.gol1==null || pk.gol2==null) return null;
  if(pk.gol1>pk.gol2) return h;
  if(pk.gol2>pk.gol1) return a;
  if(pk.pen==='sel1') return h;
  if(pk.pen==='sel2') return a;
  return null;
}
// Os dois times de um jogo na chave PESSOAL de p (89+ = vencedores que p escolheu; feed de 73-88 = real)
function pickTeams(p, j){
  j=Number(j);
  if(j>=73&&j<=88) return r32Teams(j);
  const b=BR[String(j)];
  if(!b) return [null,null];
  const side=slot=>{
    if(!slot) return null;
    if(slot.team) return slot.team;
    if(slot.win!=null) return pickWinner(p, slot.win);
    if(slot.lose!=null){
      const g=slot.lose;const[h,a]=pickTeams(p,g);const w=pickWinner(p,g);
      if(!h||!a||!w) return null; return w===h?a:h;
    }
    return null;
  };
  return [side(b.home), side(b.away)];
}
// Times para exibição na aba de palpites: nome real quando definido, senão rótulo.
function pickDisplayTeams(p, g){
  const j=Number(g.jogo);
  if(j>=73&&j<=88) return r32Teams(j);
  const b=BR[String(j)];if(!b)return[null,null];
  const [h,a]=pickTeams(p,j);
  return [h||slotLabel(b.home), a||slotLabel(b.away)];
}

// ===== MODELO ALTERNADO DO MATA-MATA =====
// Fases REAIS (palpita sobre os classificados oficiais): Oitavas 89-96, Semis 101-102.
// Fases HERDADAS (confronto vem dos vencedores que a pessoa palpitou na fase anterior): Quartas 97-100, Final/3º 103-104.
function phaseKind(j){
  j=Number(j);
  if(j>=89&&j<=96) return 'real';
  if(j>=97&&j<=100) return 'inherited';
  if(j>=101&&j<=102) return 'real';
  if(j===103||j===104) return 'inherited';
  return 'real';
}
// vencedor que a pessoa apontou no jogo j (pelo placar/pênaltis dela), usando os times que ELA via naquele jogo
function koWinner(p, j){
  j=Number(j);
  const [h,a]=koMatchup(p,j);
  if(!h||!a) return null;
  const pk=parts[p]?.[j];
  if(!pk||pk.gol1==null||pk.gol2==null) return null;
  if(pk.gol1>pk.gol2) return h;
  if(pk.gol2>pk.gol1) return a;
  if(pk.pen==='sel1') return h;
  if(pk.pen==='sel2') return a;
  return null;
}
// os dois times do jogo j na visão da PESSOA (real se fase real; herdado dos vencedores palpitados se herdada)
function koMatchup(p, j){
  j=Number(j);
  const b=BR[String(j)];
  if(!b) return [null,null];
  if(phaseKind(j)==='real'){
    // confronto oficial (resolve pelos resultados reais)
    return [resolveSlot(b.home), resolveSlot(b.away)];
  }
  // herdado: cada lado vem do vencedor que a pessoa palpitou no jogo alimentador
  const side=slot=>{
    if(!slot) return null;
    if(slot.team) return slot.team;
    if(slot.win!=null) return koWinner(p, slot.win);
    if(slot.lose!=null){ // perdedor (3º lugar) na visão da pessoa
      const g=slot.lose;const[h,a]=koMatchup(p,g);const w=koWinner(p,g);
      if(!h||!a||!w) return null; return w===h?a:h;
    }
    return null;
  };
  return [side(b.home), side(b.away)];
}
// confronto REAL oficial do jogo j (os dois classificados de verdade)
function realMatchup(j){
  const b=BR[String(j)];if(!b)return[null,null];
  return [resolveSlot(b.home), resolveSlot(b.away)];
}
// pontuação de um jogo do mata-mata (89+) respeitando o modelo alternado
function scoreKO(p, j){
  const o=off[j];
  if(!o||o.gol1==null||o.gol2==null) return {pts:0,state:'pending'};
  const pk=parts[p]?.[j];
  if(!pk||pk.gol1==null||pk.gol2==null) return {pts:0,state:'nopick'};
  if(phaseKind(j)==='inherited'){
    // só pontua se o confronto que a pessoa montou == confronto real do jogo
    const [ph,pa]=koMatchup(p,j);      // times que a pessoa levou até aqui
    const [rh,ra]=realMatchup(j);      // times reais
    if(!ph||!pa||!rh||!ra) return {pts:0,state:'wrong'};
    const sameMatch = (ph===rh&&pa===ra)||(ph===ra&&pa===rh);
    if(!sameMatch) return {pts:0,state:'wrong'}; // confronto "queimado"
  }
  // fase real, ou herdada com confronto batendo: pontua pelo placar normal
  return scorePick(pk,o);
}

const content=document.getElementById("content");

// datetime of a game in Brasília time (UTC-3), returns ms epoch
function gameStart(g){
  if(!g.data||!g.hora)return null;
  const [Y,M,D]=g.data.split('-').map(Number);
  const [h,m]=g.hora.split(':').map(Number);
  // build as UTC then shift +3h to represent Brasília (UTC-3)
  return Date.UTC(Y,M-1,D,h+3,m||0);
}
// find the featured game: one live now (started <150min ago, no result), else next upcoming, else last finished
function featuredGame(){
  const now=Date.now();const withT=games.map(g=>({g,t:gameStart(g)})).filter(x=>x.t!=null);
  // live: started, within 150 min window, still no official result
  const live=withT.filter(x=>x.t<=now && now-x.t<150*60000 && !hasResult(x.g.jogo)).sort((a,b)=>b.t-a.t)[0];
  if(live)return{...live,mode:'live'};
  // next: earliest start in the future
  const next=withT.filter(x=>x.t>now).sort((a,b)=>a.t-b.t)[0];
  if(next)return{...next,mode:'next'};
  // fallback: most recent finished
  const last=withT.filter(x=>hasResult(x.g.jogo)).sort((a,b)=>b.t-a.t)[0];
  return last?{...last,mode:'last'}:null;
}
function fmtWhen(t){
  const d=new Date(t);
  const dias=['dom','seg','ter','qua','qui','sex','sáb'];
  // display in Brasília: subtract the +3 we added, i.e. read UTC parts back as local-agnostic
  const bh=new Date(t-3*3600000); // back to the "wall clock" we encoded
  const dd=String(bh.getUTCDate()).padStart(2,'0');
  const mm=String(bh.getUTCMonth()+1).padStart(2,'0');
  const hh=String(bh.getUTCHours()).padStart(2,'0');
  const mi=String(bh.getUTCMinutes()).padStart(2,'0');
  return `${dias[bh.getUTCDay()]} ${dd}/${mm} · ${hh}:${mi}`;
}
function featuredCard(){
  const f=featuredGame();if(!f)return"";
  const g=f.g,o=off[g.jogo]||{};const[s1,s2]=displayTeams(g);
  const real1=isRealTeam(s1),real2=isRealTeam(s2);
  const fl1=real1?flag(s1):'🏳️',fl2=real2?flag(s2):'🏳️';
  const done=hasResult(g.jogo);
  let badge,scoreHtml;
  if(f.mode==='live'){badge=`<span class="fx-badge live"><span class="pulse"></span>Acontecendo agora</span>`;
    scoreHtml=done?`${o.gol1} <span class="fx-x">×</span> ${o.gol2}`:`<span class="fx-x">×</span>`;}
  else if(f.mode==='next'){badge=`<span class="fx-badge next">Próximo jogo</span>`;scoreHtml=`<span class="fx-x">×</span>`;}
  else{badge=`<span class="fx-badge last">Último resultado</span>`;scoreHtml=`${o.gol1} <span class="fx-x">×</span> ${o.gol2}`;}
  const penNote=(done&&o.pen)?`<div class="fx-pen">🏆 ${o.pen==='sel1'?s1:s2} nos pênaltis</div>`:"";
  return `<div class="featured">
    <div class="fx-top">${badge}<span class="fx-meta">Jogo ${g.jogo} · ${g.fase} · ${fmtWhen(f.t)}</span></div>
    <div class="fx-teams">
      <div class="fx-team"><span class="fx-flag">${fl1}</span><span class="fx-name ${real1?'':'label'}">${s1||'A definir'}</span></div>
      <div class="fx-score">${scoreHtml}</div>
      <div class="fx-team right"><span class="fx-name ${real2?'':'label'}">${s2||'A definir'}</span><span class="fx-flag">${fl2}</span></div>
    </div>${penNote}
  </div>`;
}

function ranking(){
  const rows=players.map(p=>({p,...totalFor(p)})).sort((a,b)=>b.t-a.t||b.exact-a.exact||a.p.localeCompare(b.p));
  const played=playedCount(), n=rows.length;

  if(played===0){content.innerHTML=`<div class="empty">O ranking aparece conforme os placares entram na planilha.</div>`;return;}
  const GOLD_S=[244,196,48], SCARLET=[196,22,42];
  const rgb=c=>`rgb(${c[0]},${c[1]},${c[2]})`;
  const rgba=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;
  const lighten=(c,a)=>c.map(v=>Math.round(Math.min(255,v+(255-v)*a)));

  const stageBars=rows.map((r,i)=>{

    return `<div class="sb${i===0?' first podium1':i===1?' podium2':i===2?' podium3':''}" style="${style}"
      title="${r.p.replace(/_/g," ")} — ${i+1}º · ${r.t} pts · ${r.exact} exatos · ${r.hits} acertos">
      <div class="sb-plot">

        <div class="sb-col"></div>

        <div class="sb-refl"></div>
        <span class="sb-val-bot">${r.t}<span class="sb-pts">pts</span></span>

  }).join("");
  const CF_COLS=['#f4c430','#fff3cf','#c4162a','#e8913a','#ffffff','#d4a017'];
  const confetti=q=>Array.from({length:q},()=>{
    const size=4+Math.random()*7;
    const round=Math.random()>.55;
    const cf=[`left:${(Math.random()*100).toFixed(2)}%`,`--w:${size.toFixed(1)}px`,
      `--hh:${(size*(round?1:.42)).toFixed(1)}px`,`--col:${CF_COLS[Math.floor(Math.random()*CF_COLS.length)]}`,
      `--d:${(7+Math.random()*9).toFixed(2)}s`,`--dl:${(Math.random()*11).toFixed(2)}s`,
      `--rot:${Math.floor(Math.random()*360)}deg`,`--spin:${Math.floor(360+Math.random()*1080)}deg`,
      `--dx:${Math.floor(Math.random()*160-80)}px`,`--br:${round?'50%':'1px'}`].join(';');
    return `<i class="cf" style="${cf}"></i>`;
  }).join("");
  content.innerHTML=`<div class="stage">
    <div class="confetti back">${confetti(55)}</div>

      <div class="stage-rule"></div>

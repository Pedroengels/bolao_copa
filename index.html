}

function jogos(){
  const nav=`<div class="round-nav">`+rounds.map(r=>{const gs=games.filter(g=>g.fase===r);return `<button class="round-btn ${r===activeRound?'active':''}" data-round="${r}">${r}<span class="n">${gs.length}</span></button>`;}).join("")+`</div>`;
  const gs=games.filter(g=>g.fase===activeRound);
  const matches=gs.map(g=>{
    const o=off[g.jogo]||{};const[s1,s2]=displayTeams(g);const done=hasResult(g.jogo);
    const real1=isRealTeam(s1),real2=isRealTeam(s2);
    const w1=done&&o.gol1>o.gol2, w2=done&&o.gol2>o.gol1, penW1=done&&o.pen==='sel1', penW2=done&&o.pen==='sel2';
    let pickRows="";
    const isKO = g.jogo>=89;
    const isInherited = isKO && phaseKind(g.jogo)==='inherited';
    const burned = p => {
      if(!isInherited) return false;
      const [ph,pa]=koMatchup(p,g.jogo);
      const [rh,ra]=realMatchup(g.jogo);
      if(!ph||!pa||!rh||!ra) return true;
      return !((ph===rh&&pa===ra)||(ph===ra&&pa===rh));
    };
    {
      const scored=players
        .filter(p=>!burned(p))
        .map(p=>({p,pk:parts[p]?.[g.jogo],s:isKO?scoreKO(p,g.jogo):scorePick(parts[p]?.[g.jogo],done?o:null)}))
        .sort((a,b)=>b.s.pts-a.s.pts);
      pickRows=scored.map(row=>{const pk=row.pk;const sc=(pk&&pk.gol1!=null&&pk.gol2!=null)?`${pk.gol1}–${pk.gol2}`:"—";
        const cls=row.s.state==="exact"?"pts-exact":row.s.state==="result"?"pts-result":"pts-zero";
        const shown=done?`<span class="${cls}">+${row.s.pts}<span class="tag">${row.s.tag||'zero'}</span></span>`:`<span class="pick-pts" style="color:var(--muted)">·</span>`;
        return `<div class="pick-row"><span class="pick-name">${row.p.replace(/_/g," ")}</span><span class="pick-score">${sc}</span><span class="pick-pts">${shown}</span></div>`;}).join("");
    }
    const scoreArea=done?`<div class="scorebox"><span class="score-final">${o.gol1}</span><span class="vs">×</span><span class="score-final">${o.gol2}</span></div>`:`<div class="scorebox"><span class="score-pending">— × —</span></div>`;
    const penNote=(done&&o.pen)?`<div class="pen-note">🏆 ${o.pen==='sel1'?s1:s2} avançou nos pênaltis</div>`:"";
    const fl1=real1?`<span class="flag">${flag(s1)}</span>`:"";
    const fl2=real2?`<span class="flag">${flag(s2)}</span>`:"";
    const nPicks=players.filter(p=>{
      const pk=parts[p]?.[g.jogo];
      if(!pk||pk.gol1==null||pk.gol2==null) return false;
      return !burned(p);
    }).length;
    const burnedCount = isInherited ? players.filter(p=>{const pk=parts[p]?.[g.jogo];return pk&&pk.gol1!=null&&pk.gol2!=null&&burned(p);}).length : 0;
    const burnLabel = isInherited && burnedCount>0 ? ` <span class="acc-burn">(${burnedCount} queimados)</span>` : '';
    const picksHtml=`<details class="picks-acc"><summary><span class="acc-label">Ver palpites & pontos</span><span class="acc-count">${nPicks} palpites${burnLabel}</span><span class="acc-caret">▾</span></summary><div class="picks">${pickRows||'<div class="empty">Ninguém montou o confronto correto.</div>'}</div></details>`;
    return `<div class="match ${done?'done':''}">
      <div class="match-head"><span class="match-meta">Jogo <b>${g.jogo}</b> · ${g.cruzamento} · ${g.data} ${g.hora}</span>
      <span class="status ${done?'done':'wait'}">${done?'Final':'Aguardando'}</span></div>
      <div class="teams">
        <div class="team home">${fl1}<span class="tn ${(w1||penW1)?'win':''} ${real1?'':'label'}">${s1||'A definir'}</span></div>
        ${scoreArea}
        <div class="team away"><span class="tn ${(w2||penW2)?'win':''} ${real2?'':'label'}">${s2||'A definir'}</span>${fl2}</div>
      </div>${penNote}
      ${picksHtml}
    </div>`;
  }).join("");
  content.innerHTML=nav+matches;
  content.querySelectorAll(".round-btn").forEach(b=>b.onclick=()=>{activeRound=b.dataset.round;render();});
}

function stats(){
  const played=playedCount();
  if(played===0){content.innerHTML=`<div class="empty">Nenhum jogo com placar lançado ainda. As estatísticas aparecem conforme os resultados entram na planilha.</div>`;return;}
  const rows=players.map(p=>({p,...totalFor(p)}));
  const totalPicks=rows.reduce((a,r)=>a+r.made,0),totalExact=rows.reduce((a,r)=>a+r.exact,0),totalHits=rows.reduce((a,r)=>a+r.hits,0);
  const avgPts=(rows.reduce((a,r)=>a+r.t,0)/players.length).toFixed(1);
  const hitRate=totalPicks?Math.round(totalHits/totalPicks*100):0,exactRate=totalPicks?Math.round(totalExact/totalPicks*100):0;
  const byExact=[...rows].sort((a,b)=>b.exact-a.exact||b.t-a.t);
  const byHitRate=[...rows].filter(r=>r.made>0).map(r=>({...r,rate:r.hits/r.made})).sort((a,b)=>b.rate-a.rate||b.made-a.made);
  const cards=`<div class="stat-grid">
    <div class="stat-card"><div class="k">Jogos disputados</div><div class="v">${played}<span style="font-size:16px;color:var(--muted)">/${games.length}</span></div><div class="sub">2ª fase</div></div>
    <div class="stat-card"><div class="k">Média de pontos</div><div class="v cyan">${avgPts}</div><div class="sub">por participante</div></div>
    <div class="stat-card"><div class="k">Taxa de acerto</div><div class="v">${hitRate}%</div><div class="sub">palpites que pontuaram</div></div>
    <div class="stat-card"><div class="k">Placares exatos</div><div class="v cyan">${totalExact}</div><div class="sub">${exactRate}% dos palpites</div></div>__GOALS_CARD__</div>`;
  const maxExact=Math.max(1,byExact[0].exact);
  const exactBlock=`<div class="stat-block"><h3>Reis do placar exato <span class="hint">3 pts cada</span></h3>`+byExact.slice(0,8).map(r=>`<div class="hbar"><span class="lbl">${r.p.replace(/_/g," ")}</span><div class="track"><span style="width:${Math.round(r.exact/maxExact*100)}%"></span></div><span class="val">${r.exact}</span></div>`).join("")+`</div>`;
  const hrBlock=`<div class="stat-block"><h3>Melhor aproveitamento <span class="hint">acertos ÷ palpites</span></h3>`+byHitRate.slice(0,8).map(r=>`<div class="hbar"><span class="lbl">${r.p.replace(/_/g," ")}</span><div class="track"><span style="width:${Math.round(r.rate*100)}%"></span></div><span class="val">${Math.round(r.rate*100)}%</span></div>`).join("")+`</div>`;
  const consRows=games.filter(g=>hasResult(g.jogo)).map(g=>{
    const[s1,s2]=displayTeams(g);const o=off[g.jogo];const cnt={};let voters=0;
    for(const p of players){const pk=parts[p]?.[g.jogo];if(pk&&pk.gol1!=null&&pk.gol2!=null){const key=`${pk.gol1}–${pk.gol2}`;cnt[key]=(cnt[key]||0)+1;voters++;}}
    let best="—",bn=0;for(const k in cnt){if(cnt[k]>bn){bn=cnt[k];best=k;}}
    const pct=voters?Math.round(bn/voters*100):0,realKey=`${o.gol1}–${o.gol2}`;
    return {jogo:g.jogo,label:`${s1} × ${s2}`,best,pct,voters,real:realKey,matchReal:best===realKey};
  });
  const consBlock=`<div class="stat-block"><h3>Palpite mais popular por jogo <span class="hint">placar oficial em destaque</span></h3>`+consRows.map(c=>`<div class="consensus"><div><span class="game">J${c.jogo} · ${c.label}</span><br><span class="pop">${c.best} <span style="color:var(--muted);font-weight:400">(${c.voters} palpites)</span> ${c.matchReal?'· <span style="color:var(--gold)">✓ bateu</span>':`· <span style="color:var(--muted)">oficial ${c.real}</span>`}</span></div><span class="pct">${c.pct}%</span></div>`).join("")+`</div>`;

  // --- NEW STATS ---
  const finished=games.filter(g=>hasResult(g.jogo));
  // per-game: how many scored, how many exact
  const gameStats=finished.map(g=>{
    const o=off[g.jogo];let sc=0,ex=0,vot=0;
    for(const p of players){const pk=parts[p]?.[g.jogo];if(pk&&pk.gol1!=null&&pk.gol2!=null){vot++;const s=scorePick(pk,o);if(s.pts>0)sc++;if(s.state==='exact')ex++;}}
    const[s1,s2]=displayTeams(g);
    return{jogo:g.jogo,label:`${s1} × ${s2}`,sc,ex,vot,rate:vot?sc/vot:0};
  });
  const hardest=[...gameStats].filter(x=>x.vot>0).sort((a,b)=>a.rate-b.rate)[0];
  const easiest=[...gameStats].filter(x=>x.vot>0).sort((a,b)=>b.rate-a.rate)[0];
  const trickyBlock=(hardest&&easiest)?`<div class="stat-block"><h3>Jogos mais difíceis e mais fáceis <span class="hint">% que pontuou</span></h3>
    <div class="duo"><div class="duo-item hard"><div class="duo-k">🧩 Pegadinha da rodada</div><div class="duo-g">J${hardest.jogo} · ${hardest.label}</div><div class="duo-v">${Math.round(hardest.rate*100)}% acertaram · ${off[hardest.jogo].gol1}–${off[hardest.jogo].gol2}</div></div>
    <div class="duo-item easy"><div class="duo-k">🎯 Mais previsível</div><div class="duo-g">J${easiest.jogo} · ${easiest.label}</div><div class="duo-v">${Math.round(easiest.rate*100)}% acertaram · ${off[easiest.jogo].gol1}–${off[easiest.jogo].gol2}</div></div></div></div>`:"";

  // longest current streak of scoring (consecutive finished games by jogo number where player scored >0)
  const finIds=finished.map(g=>g.jogo).sort((a,b)=>a-b);
  const streaks=players.map(p=>{
    let best=0,cur=0;
    for(const j of finIds){const s=scorePick(parts[p]?.[j],off[j]);if(s.pts>0){cur++;best=Math.max(best,cur);}else cur=0;}
    return{p,best};
  }).filter(x=>x.best>0).sort((a,b)=>b.best-a.best);
  const maxStreak=streaks.length?streaks[0].best:0;
  const streakBlock=streaks.length?`<div class="stat-block"><h3>Maior sequência de acertos <span class="hint">jogos seguidos pontuando</span></h3>`+streaks.slice(0,6).map(r=>`<div class="hbar"><span class="lbl">${r.p.replace(/_/g," ")}</span><div class="track"><span style="width:${Math.round(r.best/maxStreak*100)}%"></span></div><span class="val">${r.best}🔥</span></div>`).join("")+`</div>`:"";

  // underdog score: sum of (1/popularity) for each exact hit -> rewards rare correct calls
  const underdog=players.map(p=>{
    let score=0,rare=null,rareG=null;
    for(const g of finished){
      const pk=parts[p]?.[g.jogo];if(!pk||pk.gol1==null||pk.gol2==null)continue;
      const s=scorePick(pk,off[g.jogo]);
      if(s.state==='exact'){
        // how many others also nailed this exact score
        let same=0,vot=0;for(const q of players){const qk=parts[q]?.[g.jogo];if(qk&&qk.gol1!=null&&qk.gol2!=null){vot++;if(qk.gol1===off[g.jogo].gol1&&qk.gol2===off[g.jogo].gol2)same++;}}
        const w=vot/Math.max(1,same); // higher when few nailed it
        score+=w;
        if(rare==null||same<rare){rare=same;rareG=g.jogo;}
      }
    }
    return{p,score,rare,rareG};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  const maxUd=underdog.length?underdog[0].score:1;
  const udBlock=underdog.length?`<div class="stat-block"><h3>Faro de azarão <span class="hint">placares exatos que poucos acertaram</span></h3>`+underdog.slice(0,6).map(r=>`<div class="hbar"><span class="lbl">${r.p.replace(/_/g," ")}</span><div class="track"><span style="width:${Math.round(r.score/maxUd*100)}%"></span></div><span class="val">${r.score.toFixed(1)}</span></div>`).join("")+`</div>`:"";

  // gols: average goals per game predicted vs real
  let realGoals=0,realN=0;for(const g of finished){realGoals+=off[g.jogo].gol1+off[g.jogo].gol2;realN++;}
  let predSum=0,predN=0;for(const g of finished){for(const p of players){const pk=parts[p]?.[g.jogo];if(pk&&pk.gol1!=null&&pk.gol2!=null){predSum+=pk.gol1+pk.gol2;predN++;}}}
  const avgReal=realN?(realGoals/realN).toFixed(2):'—',avgPred=predN?(predSum/predN).toFixed(2):'—';
  const goalsCard=`<div class="stat-card"><div class="k">Gols por jogo</div><div class="v">${avgReal}</div><div class="sub">palpitado: ${avgPred}</div></div>`;

  // --- ESTATÍSTICAS NEGATIVAS ---
  // jogos zerados = palpitou mas tirou 0
  const negRows=players.map(p=>{const tf=totalFor(p);return{p,zeros:tf.made-tf.hits,made:tf.made,rate:tf.made?tf.hits/tf.made:0};});
  const byZeros=[...negRows].filter(r=>r.made>0).sort((a,b)=>b.zeros-a.zeros||a.rate-b.rate);
  const maxZeros=Math.max(1,byZeros[0]?.zeros||1);
  const zerosBlock=byZeros.length?`<div class="stat-block"><h3>🥶 Mais jogos zerados <span class="hint">palpitou e não pontuou</span></h3>`+byZeros.slice(0,6).map(r=>`<div class="hbar"><span class="lbl">${r.p.replace(/_/g," ")}</span><div class="track"><span class="track-cold" style="width:${Math.round(r.zeros/maxZeros*100)}%"></span></div><span class="val cold">${r.zeros}</span></div>`).join("")+`</div>`:"";
  // pior aproveitamento
  const byWorst=[...negRows].filter(r=>r.made>0).sort((a,b)=>a.rate-b.rate||b.zeros-a.zeros);
  const worstBlock=byWorst.length?`<div class="stat-block"><h3>❄️ Pior aproveitamento <span class="hint">menor % de acerto</span></h3>`+byWorst.slice(0,6).map(r=>`<div class="hbar"><span class="lbl">${r.p.replace(/_/g," ")}</span><div class="track"><span class="track-cold" style="width:${Math.round((1-r.rate)*100)}%"></span></div><span class="val cold">${Math.round(r.rate*100)}%</span></div>`).join("")+`</div>`:"";
  // maior seca: maior sequência de jogos consecutivos sem pontuar
  const droughts=players.map(p=>{let best=0,cur=0;for(const j of finIds){const pk=parts[p]?.[j];const s=scorePick(pk,off[j]);if(pk&&pk.gol1!=null&&pk.gol2!=null&&s.pts===0){cur++;best=Math.max(best,cur);}else cur=0;}return{p,best};}).filter(x=>x.best>0).sort((a,b)=>b.best-a.best);
  const maxDrought=droughts.length?droughts[0].best:1;
  const droughtBlock=droughts.length?`<div class="stat-block"><h3>🧊 Maior seca <span class="hint">jogos seguidos sem pontuar</span></h3>`+droughts.slice(0,6).map(r=>`<div class="hbar"><span class="lbl">${r.p.replace(/_/g," ")}</span><div class="track"><span class="track-cold" style="width:${Math.round(r.best/maxDrought*100)}%"></span></div><span class="val cold">${r.best}</span></div>`).join("")+`</div>`:"";

  // ===== ESTATÍSTICAS POR FASE (Rei de cada fase) =====
  const pbp=pointsByPhase();
  const phaseKings=PHASES.map(ph=>{
    const scored=players.map(p=>({p,...pbp[p][ph]})).filter(r=>r.total>0);
    const anyPlayed=scored.some(r=>{
      // fase teve pelo menos um jogo com resultado?
      const phaseIds=games.filter(g=>phaseOf(g.jogo)===ph).map(g=>g.jogo);
      return phaseIds.some(j=>hasResult(j));
    });
    if(!anyPlayed) return null;
    scored.sort((a,b)=>b.pts-a.pts||b.exact-a.exact);
    const top=scored[0];
    return{ph,top,scored:scored.slice(0,3)};
  }).filter(Boolean);
  const kingsBlock=phaseKings.length?`<div class="stat-block"><h3>👑 Rei de cada fase <span class="hint">quem mais pontuou por fase</span></h3><div class="kings-grid">`+phaseKings.map(k=>`<div class="king-card"><div class="king-phase">${k.ph}</div><div class="king-who">${k.top.p.replace(/_/g," ")}</div><div class="king-big">${k.top.pts}<span>pts</span></div><div class="king-meta"><b>${k.top.exact}</b> exatos · <b>${k.top.hits}</b> acertos</div></div>`).join("")+`</div></div>`:"";

  // ===== JOGO MAIS DECISIVO =====
  // jogo onde a diferença entre 1º e 2º MAIS mudou
  const cumSeries=cumulativePoints();
  let decisiveGame=null,maxShift=-1;
  const finiIds=games.filter(g=>hasResult(g.jogo)).map(g=>g.jogo).sort((a,b)=>a-b);
  for(let i=0;i<finiIds.length;i++){
    // pontos no fim de cada jogo
    const rankAt=(k)=>{
      const t={};
      for(const p of players){t[p]=0;for(let ii=0;ii<=k;ii++){t[p]+=scoreForGame(p,finiIds[ii]).pts;}}
      const sorted=Object.entries(t).sort((a,b)=>b[1]-a[1]);
      return sorted;
    };
    if(i===0)continue;
    const cur=rankAt(i),prev=rankAt(i-1);
    // mudança total de posições no top 5
    let shift=0;
    for(let k=0;k<Math.min(5,cur.length);k++){
      const p=cur[k][0];
      const oldPos=prev.findIndex(x=>x[0]===p);
      if(oldPos!==-1)shift+=Math.abs(oldPos-k);
    }
    if(shift>maxShift){maxShift=shift;decisiveGame=finiIds[i];}
  }
  let decisiveBlock="";
  if(decisiveGame){
    const g=games.find(x=>x.jogo===decisiveGame);const[s1,s2]=displayTeams(g);const o=off[decisiveGame];
    decisiveBlock=`<div class="stat-block"><h3>💥 Jogo mais decisivo <span class="hint">quando o ranking mais mexeu</span></h3><div class="decisive"><div class="dec-g">J${decisiveGame} · ${s1} ${o.gol1}–${o.gol2} ${s2}</div><div class="dec-d">${maxShift} posições trocadas no top 5</div></div></div>`;
  }

  // ===== CONTRA A MARÉ =====
  // pessoas que acertaram jogos onde o palpite delas foi minoria (< 25% dos palpiteiros)
  const contraMare=players.map(p=>{
    let against=0;const jogos=[];
    for(const g of finished){
      const o=off[g.jogo];const pk=parts[p]?.[g.jogo];if(!pk||pk.gol1==null||pk.gol2==null)continue;
      const s=scoreForGame(p,g.jogo);if(s.pts===0)continue;
      // olhou o resultado; conta quantos palpitaram o mesmo desfecho
      const myOut=(pk.gol1>pk.gol2?'H':pk.gol2>pk.gol1?'A':'D');
      let same=0,vot=0;for(const q of players){const qk=parts[q]?.[g.jogo];if(qk&&qk.gol1!=null&&qk.gol2!=null){vot++;const qo=(qk.gol1>qk.gol2?'H':qk.gol2>qk.gol1?'A':'D');if(qo===myOut)same++;}}
      if(vot>=4 && same/vot<0.25){against++;jogos.push(g.jogo);}
    }
    return{p,against,jogos};
  }).filter(r=>r.against>0).sort((a,b)=>b.against-a.against);
  const cmBlock=contraMare.length?`<div class="stat-block"><h3>🌊 Contra a maré <span class="hint">acertou o que quase ninguém acertou</span></h3>`+contraMare.slice(0,6).map(r=>`<div class="hbar"><span class="lbl">${r.p.replace(/_/g," ")}</span><div class="track"><span style="width:${Math.round(r.against/contraMare[0].against*100)}%"></span></div><span class="val">${r.against}</span></div>`).join("")+`</div>`:"";

  // ===== EVOLUÇÃO DO PÓDIO =====
  // quem esteve no top 3 ao longo dos jogos
  const podiumEvolution={};
  for(const p of players)podiumEvolution[p]=0;
  for(let i=0;i<finiIds.length;i++){
    const t={};for(const p of players){t[p]=0;for(let ii=0;ii<=i;ii++)t[p]+=scoreForGame(p,finiIds[ii]).pts;}
    const sorted=Object.entries(t).sort((a,b)=>b[1]-a[1]).slice(0,3);
    for(const[p]of sorted)podiumEvolution[p]++;
  }
  const podEvoArr=Object.entries(podiumEvolution).filter(([,c])=>c>0).sort((a,b)=>b[1]-a[1]);
  const maxPodEvo=podEvoArr.length?podEvoArr[0][1]:1;
  const podEvoBlock=podEvoArr.length?`<div class="stat-block"><h3>🎗️ Frequentadores do pódio <span class="hint">quantos jogos em que ficaram no top 3</span></h3>`+podEvoArr.slice(0,6).map(([p,c])=>`<div class="hbar"><span class="lbl">${p.replace(/_/g," ")}</span><div class="track"><span style="width:${Math.round(c/maxPodEvo*100)}%"></span></div><span class="val">${c}</span></div>`).join("")+`</div>`:"";

  // ===== CURVA DE PONTOS =====
  // gráfico SVG de linhas: pontos acumulados por participante ao longo dos jogos
  let curveBlock="";
  if(finiIds.length>1){
    const W=800,H=280,padL=40,padB=30,padT=15,padR=15;
    const maxP=Math.max(1,Math.max(...players.map(p=>cumSeries[p][cumSeries[p].length-1]?.total||0)));
    const xStep=(W-padL-padR)/(finiIds.length-1);
    const yFor=v=>H-padB-(v/maxP)*(H-padT-padB);
    // cores por rank final
    const finalOrder=players.map(p=>({p,pts:cumSeries[p][cumSeries[p].length-1]?.total||0})).sort((a,b)=>b.pts-a.pts);
    const palette=['#F5C518','#4FD6C9','#FF6B5E','#7AB8F5','#B98BFF','#FFB86C','#8FE388','#FFA5A5','#88E2F2','#F5A3B7'];
    const paths=finalOrder.slice(0,10).map((r,i)=>{
      const pts=cumSeries[r.p];
      const d=pts.map((pt,k)=>`${k===0?'M':'L'} ${padL+k*xStep} ${yFor(pt.total)}`).join(' ');
      return `<path d="${d}" stroke="${palette[i%palette.length]}" stroke-width="2" fill="none" opacity="0.85"/><text x="${padL+(pts.length-1)*xStep+3}" y="${yFor(pts[pts.length-1].total)+3}" fill="${palette[i%palette.length]}" font-size="10" font-family="JetBrains Mono">${r.p.replace(/_/g," ")}</text>`;
    }).join("");
    // eixos
    const axes=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H-padB}" stroke="#333" stroke-width="1"/><line x1="${padL}" y1="${H-padB}" x2="${W-padR}" y2="${H-padB}" stroke="#333" stroke-width="1"/><text x="${padL-6}" y="${padT+5}" fill="#888" font-size="10" font-family="JetBrains Mono" text-anchor="end">${maxP}</text><text x="${padL-6}" y="${H-padB}" fill="#888" font-size="10" font-family="JetBrains Mono" text-anchor="end">0</text><text x="${padL}" y="${H-padB+18}" fill="#888" font-size="10" font-family="JetBrains Mono">J${finiIds[0]}</text><text x="${W-padR}" y="${H-padB+18}" fill="#888" font-size="10" font-family="JetBrains Mono" text-anchor="end">J${finiIds[finiIds.length-1]}</text>`;
    curveBlock=`<div class="stat-block"><h3>📈 Curva de pontos <span class="hint">top 10 ao longo dos jogos</span></h3><div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:600px;height:auto">${axes}${paths}</svg></div></div>`;
  }

  // ===== TABELA CRUZADA: palpites × jogos =====
  // linhas = jogos (finalizados), colunas = pessoas ordenadas por posição no ranking. Cada célula: palpite + cor.
  const orderedFin=[...finished].sort((a,b)=>a.jogo-b.jogo);
  const orderedPlayers=players.map(p=>({p,...totalFor(p)})).sort((a,b)=>b.t-a.t||b.exact-a.exact||a.p.localeCompare(b.p)).map(x=>x.p);
  const headCols=orderedPlayers.map((p,idx)=>`<th class="xt-name" title="${p.replace(/_/g," ")} (${idx+1}º)"><span class="xt-rank">${idx+1}º</span> ${p.replace(/_/g," ").split(' ')[0]}</th>`).join("");
  const bodyRows=orderedFin.map(g=>{
    const o=off[g.jogo];const[s1,s2]=displayTeams(g);
    const cells=orderedPlayers.map(p=>{
      const pk=parts[p]?.[g.jogo];const s=scoreForGame(p,g.jogo);
      const cls=s.state==='exact'?'xt-exact':s.pts>0?'xt-hit':(pk&&pk.gol1!=null?'xt-miss':'xt-empty');
      const txt=(pk&&pk.gol1!=null&&pk.gol2!=null)?`${pk.gol1}–${pk.gol2}`:'—';
      return `<td class="xt-cell ${cls}" title="${p.replace(/_/g," ")}: ${txt} (${s.pts} pts)">${txt}</td>`;
    }).join("");
    const resTxt=`${o.gol1}–${o.gol2}`;
    return `<tr><td class="xt-jogo"><b>J${g.jogo}</b> ${s1||'?'} × ${s2||'?'}<span class="xt-real">${resTxt}</span></td>${cells}</tr>`;
  }).join("");
  const crossTable=orderedFin.length?`<div class="stat-block"><h3>🗂️ Tabela geral <span class="hint">colunas em ordem do ranking (1º → último) · palpites e acertos por jogo</span></h3><div class="xt-legend"><span class="xt-exact">■</span> placar exato · <span class="xt-hit">■</span> acertou vencedor · <span class="xt-miss">■</span> errou · <span class="xt-empty">■</span> não palpitou</div><div class="xt-wrap"><table class="xt"><thead><tr><th class="xt-jogo">Jogo</th>${headCols}</tr></thead><tbody>${bodyRows}</tbody></table></div></div>`:"";

  // cards ends with "...</div></div>" (last card + grid). Insert goalsCard before the final grid-close.
  const cardsWithGoals=cards.replace('__GOALS_CARD__',goalsCard);

  // Sub-abas: Visão geral · Destaques · Tabela
  const subNav=`<div class="sub-tabs">
    <button class="sub-tab ${statsSubView==='overview'?'active':''}" data-sub="overview">📌 Visão geral</button>
    <button class="sub-tab ${statsSubView==='highlights'?'active':''}" data-sub="highlights">✨ Destaques</button>
    <button class="sub-tab ${statsSubView==='table'?'active':''}" data-sub="table">🗂️ Tabela geral</button>
  </div>`;

  let bodyHtml="";
  if(statsSubView==='overview'){
    bodyHtml = cardsWithGoals + kingsBlock + trickyBlock + consBlock;
  } else if(statsSubView==='highlights'){
    bodyHtml = decisiveBlock
      + `<div class="section-label pos">🏅 Destaques positivos</div>`
      + `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="stat-cols">${exactBlock}${hrBlock}</div>`
      + `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="stat-cols2">${streakBlock}${udBlock}</div>`
      + `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="stat-colsA">${cmBlock}${podEvoBlock}</div>`
      + curveBlock
      + `<div class="section-label neg">🧊 Zona fria</div>`
      + `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="stat-cols3">${zerosBlock}${worstBlock}</div>`
      + `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="stat-cols4">${droughtBlock}<div></div></div>`;
  } else {
    bodyHtml = crossTable;
  }
  content.innerHTML = subNav + bodyHtml;
  content.querySelectorAll('.stat-cols,.stat-cols2,.stat-cols3,.stat-cols4,.stat-colsA').forEach(c=>{if(window.innerWidth<760)c.style.gridTemplateColumns='1fr';});
  content.querySelectorAll('.sub-tab').forEach(b=>{
    b.onclick=()=>{statsSubView=b.dataset.sub;stats();};
  });
}

function bracket(){
  const cols=[
    {h:"Oitavas",ids:[89,90,91,92,93,94,95,96]},
    {h:"Quartas",ids:[97,98,99,100]},
    {h:"Semifinais",ids:[101,102]},
    {h:"Final",ids:[104]},
  ];
  function tie(j){
    const o=off[String(j)]||{};const[h,a]=bracketTeams(j);const done=o.gol1!=null&&o.gol2!=null;
    let hw=false,aw=false;
    if(done){if(o.gol1>o.gol2)hw=true;else if(o.gol2>o.gol1)aw=true;else{if(o.pen==='sel1')hw=true;if(o.pen==='sel2')aw=true;}}
    const g1=done?o.gol1:'',g2=done?o.gol2:'';
    const penTxt=(done&&o.pen)?`<div class="pen">pên: ${o.pen==='sel1'?(h||'?'):(a||'?')}</div>`:"";
    return `<div class="btie ${done?'done':''}"><div class="jn">Jogo ${j}</div>
      <div class="brow ${hw?'win':''}"><span class="bteam ${hw?'win':(done?'lose':'')}"><span class="fl">${flag(h)}</span><span class="nm">${h||'A definir'}</span></span><span class="bg">${g1}</span></div>
      <div class="brow ${aw?'win':''}"><span class="bteam ${aw?'win':(done?'lose':'')}"><span class="fl">${flag(a)}</span><span class="nm">${a||'A definir'}</span></span><span class="bg">${g2}</span></div>
      ${penTxt}</div>`;
  }
  let cham=null;{const o=off['104']||{};if(o.gol1!=null&&o.gol2!=null){const[h,a]=bracketTeams(104);if(o.gol1>o.gol2)cham=h;else if(o.gol2>o.gol1)cham=a;else cham=o.pen==='sel1'?h:o.pen==='sel2'?a:null;}}
  const third=(()=>{const o=off['103']||{};if(o.gol1==null||o.gol2==null)return null;const[h,a]=bracketTeams(103);if(o.gol1>o.gol2)return h;if(o.gol2>o.gol1)return a;return o.pen==='sel1'?h:o.pen==='sel2'?a:null;})();
  const colsHtml=cols.map(c=>{
    let inner=c.ids.map(tie).join("");
    if(c.h==="Final"){
      inner+=`<div class="champ"><div class="k">🏆 Campeão</div><div class="who">${cham?flag(cham)+' '+cham:'A definir'}</div></div>`;
      inner+=`<div class="btie" style="margin-top:12px">${tie(103)}</div>`.replace('<div class="btie" ','<div ');
    }
    return `<div class="bcol ${c.h==='Final'?'final-col':''}"><h4>${c.h}</h4>${inner}</div>`;
  }).join("");
  content.innerHTML=`<div class="bracket-scroll"><div class="bracket">${colsHtml}</div></div>
    <div style="font-family:'JetBrains Mono';font-size:11px;color:var(--muted);margin-top:10px">Os confrontos se preenchem automaticamente conforme os vencedores são definidos na planilha. Jogo 103 = disputa de 3º lugar${third?` · atual: ${third}`:''}.</div>`;
}

let palpitarWho = players[0];
function palpitar(){
  if(!PICKS_ENABLED()){
    content.innerHTML=`<div class="palp-warn">✏️ A entrada de palpites ainda não está configurada. O organizador precisa publicar o Apps Script e colar a URL no dashboard.</div>`;
    return;
  }
  const p=palpitarWho;
  const opts=players.map(x=>`<option value="${x}" ${x===p?'selected':''}>${x.replace(/_/g," ")}</option>`).join("");

  // um confronto editável no formato de chave
  function palpTie(j){
    const g=games.find(x=>x.jogo===j);
    const kind=phaseKind(j);
    const b=BR[String(j)]||{};
    const[s1,s2]=koMatchup(p,j);                       // real nas fases reais; herdado nas herdadas
    const real1=isRealTeam(s1),real2=isRealTeam(s2);
    const bothReal=real1&&real2;                        // só dá pra palpitar quando os 2 lados existem
    // rótulo pra exibir quando o lado ainda não está definido
    const disp1 = real1?s1:(kind==='inherited'?'aguardando seu palpite':slotLabel(b.home)||'A definir');
    const disp2 = real2?s2:(kind==='inherited'?'aguardando seu palpite':slotLabel(b.away)||'A definir');
    const ko=gameStart(g);const started=ko!=null && Date.now()>=ko;
    const done=hasResult(j);
    const pk=parts[p]?.[j]||{};
    const hasPick = pk.gol1!=null && pk.gol2!=null;
    const saved = pk.saved===true;
    const lockedByTime = started||done;
    const waiting = !bothReal;                          // confronto ainda não definido
    const locked = lockedByTime || saved || waiting;
    const v1=pk.gol1!=null?pk.gol1:'';const v2=pk.gol2!=null?pk.gol2:'';
    const isDraw=pk.gol1!=null&&pk.gol1===pk.gol2;
    // vencedor que a PESSOA palpitou (pelo placar dela) — só destaque visual
    let winner=null;
    if(hasPick&&bothReal){
      if(pk.gol1>pk.gol2)winner=s1;else if(pk.gol2>pk.gol1)winner=s2;
      else if(pk.pen==='sel1')winner=s1;else if(pk.pen==='sel2')winner=s2;
    }
    const w1=winner&&winner===s1,w2=winner&&winner===s2;
    let penUI="";
    if(isDraw&&bothReal&&!lockedByTime&&!saved){
      penUI=`<div class="pt-pen"><span class="pt-pen-lbl">empate! quem passa?</span>
        <button class="pt-pen-btn ${pk.pen==='sel1'?'on':''}" data-pen="${j}" data-val="sel1" title="${s1}">${s1.length>10?s1.slice(0,9)+'…':s1}</button>
        <button class="pt-pen-btn ${pk.pen==='sel2'?'on':''}" data-pen="${j}" data-val="sel2" title="${s2}">${s2.length>10?s2.slice(0,9)+'…':s2}</button></div>`;
    }
    let actionUI="";
    if(waiting){
      actionUI=`<div class="pt-foot"><span class="pt-lockmsg">⏳ aguardando classificados</span></div>`;
    }else if(lockedByTime||saved){
      actionUI=`<div class="pt-foot"><span class="pt-lockmsg">${lockedByTime?'🔒 jogo começou':'🔒 palpite salvo'}</span></div>`;
    }else if(hasPick){
      const needPen = isDraw && pk.pen==null;
      actionUI=`<div class="pt-foot">
        <button class="pt-save ${needPen?'disabled':''}" data-save="${j}" ${needPen?'disabled':''}>${needPen?'escolha o pênalti':'Salvar'}</button>
        <span class="pt-status" data-status="${j}"></span></div>`;
    }
    const st=(lockedByTime||saved)?`<span class="pt-lock">🔒</span>`:(waiting?`<span class="pt-lock">⏳</span>`:'');
    const badge=kind==='inherited'?`<span class="pt-badge inh" title="Confronto vem do que você palpitou na fase anterior. Só pontua se bater com o confronto real.">sua chave</span>`:`<span class="pt-badge rl" title="Confronto real dos classificados.">real</span>`;
    return `<div class="ptie ${locked?'locked':''} ${winner?'decided':''}" data-jogo="${j}">
      <div class="pt-head"><span class="pt-jn">Jogo ${j}</span>${badge}${st}</div>
      <div class="pt-side ${w1?'win':''}">
        <span class="pt-fl">${real1?flag(s1):'⚪'}</span>
        <span class="pt-nm ${real1?'':'lbl'}">${disp1}</span>
        <input class="pt-in" type="number" min="0" inputmode="numeric" data-side="1" data-jogo="${j}" value="${v1}" ${locked?'disabled':''}>
      </div>
      <div class="pt-side ${w2?'win':''}">
        <span class="pt-fl">${real2?flag(s2):'⚪'}</span>
        <span class="pt-nm ${real2?'':'lbl'}">${disp2}</span>
        <input class="pt-in" type="number" min="0" inputmode="numeric" data-side="2" data-jogo="${j}" value="${v2}" ${locked?'disabled':''}>
      </div>
      ${penUI}
      ${actionUI}
    </div>`;
  }

  const cols=[
    {h:"Oitavas",ids:[89,90,91,92,93,94,95,96]},
    {h:"Quartas",ids:[97,98,99,100]},
    {h:"Semifinais",ids:[101,102]},
    {h:"Final",ids:[104]},
  ];
  const colsHtml=cols.map(c=>{
    let inner=c.ids.map(palpTie).join("");
    if(c.h==="Final"){
      inner+=palpTie(103);
    }
    return `<div class="pcol ${c.h==='Final'?'final-col':''}"><h4>${c.h}</h4>${inner}</div>`;
  }).join("");

  content.innerHTML=`
    <div class="palp-head">
      <div class="palp-whobox">
        <label class="palp-label">Palpitando como:</label>
        <div class="palp-whorow">
          <span class="palp-bigname">${p.replace(/_/g," ")}</span>
          <select class="sel" id="palpWho">${opts}</select>
        </div>
      </div>
      <div class="palp-note">Palpite o placar de cada jogo do mata-mata. Os confrontos aparecem conforme os times se classificam de verdade — cada fase abre quando a anterior termina. <b>Atenção:</b> ao salvar, o jogo trava.</div>
    </div>
    <div class="palp-savebar"><span class="palp-savemsg" id="palpMsg">Palpite os jogos já definidos. Os demais abrem quando os classificados saírem.</span></div>
    <div class="bracket-scroll"><div class="pbracket">${colsHtml}</div></div>
    <div style="font-family:'JetBrains Mono';font-size:11px;color:var(--muted);margin-top:10px">Jogo 103 = disputa de 3º lugar · placar exato vale 3 pts, acertar o vencedor vale 1 pt.</div>`;

  document.getElementById("palpWho").onchange=e=>{palpitarWho=e.target.value;palpitar();};

  function flashMsg(txt,cls){const m=document.getElementById('palpMsg');if(m){m.textContent=txt;m.className='palp-savemsg '+(cls||'');}}

  // inputs: atualizam só o estado local (NÃO salvam). Re-render só quando útil (não some o que você digita).
  content.querySelectorAll(".pt-in").forEach(inp=>{
    inp.onchange=()=>{
      const j=+inp.dataset.jogo;
      const card=content.querySelector(`.ptie[data-jogo="${j}"]`);
      const ins=card.querySelectorAll(".pt-in");
      const g1=ins[0].value===''?null:Math.max(0,parseInt(ins[0].value,10));
      const g2=ins[1].value===''?null:Math.max(0,parseInt(ins[1].value,10));
      if(!parts[p][j])parts[p][j]={sel1:null,sel2:null,gol1:null,gol2:null,pen:null};
      parts[p][j].gol1=isNaN(g1)?null:g1;parts[p][j].gol2=isNaN(g2)?null:g2;
      if(parts[p][j].gol1!==parts[p][j].gol2)parts[p][j].pen=null;
      // re-renderiza só quando os DOIS estão preenchidos (mostra botão salvar / pênaltis)
      // ou quando ambos vazios. No meio da digitação, não re-renderiza pra não apagar o campo.
      const both = parts[p][j].gol1!=null && parts[p][j].gol2!=null;
      const none = parts[p][j].gol1==null && parts[p][j].gol2==null;
      if(both||none) palpitar();
    };
  });

  // botões de pênaltis: marcam local, sem salvar (o salvar é no botão)
  content.querySelectorAll(".pt-pen-btn").forEach(btn=>{
    btn.onclick=()=>{
      const j=+btn.dataset.pen;
      if(!parts[p][j])parts[p][j]={sel1:null,sel2:null,gol1:null,gol2:null,pen:null};
      parts[p][j].pen=(parts[p][j].pen===btn.dataset.val)?null:btn.dataset.val;
      palpitar();
    };
  });

  // botão SALVAR: persiste no Sheets e trava o jogo
  content.querySelectorAll(".pt-save").forEach(btn=>{
    if(btn.disabled)return;
    btn.onclick=async()=>{
      const j=+btn.dataset.save;
      const pk=parts[p][j];
      if(!pk||pk.gol1==null||pk.gol2==null)return;
      const st=content.querySelector(`.pt-status[data-status="${j}"]`);
      if(st){st.textContent='salvando…';st.className='pt-status';}
      btn.disabled=true;
      try{
        const res=await savePick(p,j,pk.gol1,pk.gol2,pk.pen);
        if(res.ok){
          parts[p][j].saved=true;   // trava o jogo
          flashMsg('✓ jogo '+j+' salvo e travado','ok');
          palpitar();
        }else{
          if(st){st.textContent='✗ '+(res.error||'erro');st.className='pt-status err';}
          btn.disabled=false;
        }
      }catch(e){
        if(st){st.textContent='✗ sem conexão';st.className='pt-status err';}
        btn.disabled=false;
      }
    };
  });
}

// ===== FASES E HELPERS PARA RETROSPECTIVA E ESTATÍSTICAS =====
function phaseOf(j){
  j=Number(j);
  if(j>=73&&j<=88)return "16-avos";
  if(j>=89&&j<=96)return "Oitavas";
  if(j>=97&&j<=100)return "Quartas";
  if(j>=101&&j<=102)return "Semis";
  if(j===103)return "3º lugar";
  if(j===104)return "Final";
  return "Grupos";
}
const PHASES=["16-avos","Oitavas","Quartas","Semis","3º lugar","Final"];
// pontuação unificada: KO usa scoreKO (respeita chave herdada), 16-avos usa scorePick
function scoreForGame(p, j){
  const o=off[j];
  if(!o||o.gol1==null||o.gol2==null) return {pts:0,state:'pending'};
  if(j>=89) return scoreKO(p,j);
  return scorePick(parts[p]?.[j], o);
}
// pontos de cada participante em cada fase
function pointsByPhase(){
  const out={};
  for(const p of players){
    out[p]={};
    for(const ph of PHASES) out[p][ph]={pts:0,exact:0,hits:0,made:0,total:0};
    for(const g of games){
      const ph=phaseOf(g.jogo);
      if(!out[p][ph]) continue;
      out[p][ph].total++;
      const pk=parts[p]?.[g.jogo];
      if(pk&&pk.gol1!=null&&pk.gol2!=null) out[p][ph].made++;
      const s=scoreForGame(p,g.jogo);
      out[p][ph].pts+=s.pts;
      if(s.state==='exact') out[p][ph].exact++;
      if(s.pts>0) out[p][ph].hits++;
    }
  }
  return out;
}
// pontos acumulados jogo a jogo (na ordem cronológica dos jogos)
function cumulativePoints(){
  const ordered=[...games].sort((a,b)=>a.jogo-b.jogo);
  const series={};
  for(const p of players) series[p]=[];
  let running={};
  for(const p of players) running[p]=0;
  for(const g of ordered){
    const j=g.jogo;
    if(!hasResult(j)) continue;
    for(const p of players){
      running[p]+=scoreForGame(p,j).pts;
      series[p].push({jogo:j,total:running[p]});
    }
  }
  return series;
}

// ===== RETROSPECTIVA POR PESSOA =====
let retroWho=null;
function retro(){
  const played=playedCount();
  if(played===0){content.innerHTML=`<div class="empty">A retrospectiva aparece conforme os jogos são lançados.</div>`;return;}
  const rows=players.map(p=>({p,...totalFor(p)})).sort((a,b)=>b.t-a.t||b.exact-a.exact||a.p.localeCompare(b.p));
  if(!retroWho) retroWho=rows[0].p;
  const opts=rows.map(r=>`<option value="${r.p}" ${r.p===retroWho?'selected':''}>${r.p.replace(/_/g," ")} — ${r.t} pts</option>`).join("");
  const p=retroWho;
  const rank=rows.findIndex(r=>r.p===p)+1;
  const stat=rows.find(r=>r.p===p);
  const byPhase=pointsByPhase()[p];
  // best game (most points), gols palpitados, série de acertos
  let bestGame=null,bestPts=0;
  let curStreak=0,bestStreak=0;
  const finIds=games.filter(g=>hasResult(g.jogo)).map(g=>g.jogo).sort((a,b)=>a-b);
  const perGame=finIds.map(j=>{
    const g=games.find(x=>x.jogo===j);
    const s=scoreForGame(p,j);
    if(s.pts>bestPts){bestPts=s.pts;bestGame=g;}
    if(s.pts>0){curStreak++;bestStreak=Math.max(bestStreak,curStreak);}else curStreak=0;
    return {g,s,pk:parts[p]?.[j]||{}};
  });
  // rare exacts: placar que poucos acertaram
  let rarest=null,rarestSame=99;
  for(const {g,s} of perGame){
    if(s.state==='exact'){
      const o=off[g.jogo];let same=0;
      for(const q of players){const qk=parts[q]?.[g.jogo];if(qk&&qk.gol1===o.gol1&&qk.gol2===o.gol2)same++;}
      if(same<rarestSame){rarestSame=same;rarest={g,same};}
    }
  }
  // Evolução da posição ao longo dos jogos
  const cum=cumulativePoints();
  const points=cum[p];
  const evolution=points.map((pt,i)=>{
    const ranking=players.map(q=>({q,pts:cum[q][i].total})).sort((a,b)=>b.pts-a.pts);
    return {jogo:pt.jogo, pos:ranking.findIndex(x=>x.q===p)+1, pts:pt.total};
  });
  const posNow=rank, posBest=Math.min(...evolution.map(e=>e.pos));
  // per-phase cards
  const phaseCards=PHASES.filter(ph=>byPhase[ph].total>0).map(ph=>{
    const d=byPhase[ph];
    return `<div class="retro-phase">
      <div class="rp-name">${ph}</div>
      <div class="rp-pts">${d.pts}<span> pts</span></div>
      <div class="rp-detail">${d.exact} exatos · ${d.hits} acertos · ${d.made}/${d.total} palpites</div>
    </div>`;
  }).join("");
  // badges compactos
  const badges=[
    bestGame?`<span class="retro-badge"><span class="ico">🎯</span>Melhor jogo <b>J${bestGame.jogo}</b> · ${bestPts} pts</span>`:'',
    bestStreak>0?`<span class="retro-badge"><span class="ico">🔥</span><b>${bestStreak}</b> jogos seguidos pontuando</span>`:'',
    rarest?`<span class="retro-badge"><span class="ico">💎</span>Palpite improvável <b>J${rarest.g.jogo}</b> · ${rarest.same===1?'só voc\u00ea':'só '+rarest.same+' pessoas'}</span>`:'',
    `<span class="retro-badge"><span class="ico">📈</span>Melhor posição <b>${posBest}º</b></span>`
  ].filter(Boolean).join("");
  // barra empilhada de fases (colorida por fase, largura proporcional aos pts)
  const phasePalette={
    "16-avos":"#4FD6C9",
    "Oitavas":"#7AB8F5",
    "Quartas":"#F5C518",
    "Semis":"#FF8C42",
    "3º lugar":"#B98BFF",
    "Final":"#FF6B5E"
  };
  const totalPts=Math.max(1,PHASES.reduce((s,ph)=>s+(byPhase[ph]?.pts||0),0));
  const phasesWithPts=PHASES.filter(ph=>byPhase[ph]?.pts>0);
  const phaseBar=phasesWithPts.length?`<div class="retro-phase-bar">
    <div class="rpb-track">${phasesWithPts.map(ph=>{const d=byPhase[ph];const w=(d.pts/totalPts)*100;return `<div class="rpb-seg" style="width:${w}%;background:${phasePalette[ph]}" title="${ph}: ${d.pts} pts">${w>=10?d.pts:''}</div>`;}).join("")}</div>
    <div class="rpb-legend">${phasesWithPts.map(ph=>`<span><span class="sw" style="background:${phasePalette[ph]}"></span>${ph} · <b>${byPhase[ph].pts}</b> pts</span>`).join("")}</div>
  </div>`:"";
  // timeline agrupada por fase (colapsável)
  const timelineByPhase = PHASES.map(ph=>{
    const items=perGame.filter(({g})=>phaseOf(g.jogo)===ph);
    if(!items.length) return "";
    const cards=items.slice().reverse().map(({g,s,pk})=>{
      const o=off[g.jogo]||{};const[s1,s2]=displayTeams(g);
      const pkTxt=(pk.gol1!=null&&pk.gol2!=null)?`${pk.gol1}–${pk.gol2}`:'—';
      const realTxt=`${o.gol1}–${o.gol2}${o.pen?' ('+(o.pen==='sel1'?s1:s2)+' pên)':''}`;
      const cls=s.state==='exact'?'ok':s.pts>0?'partial':'miss';
      const label=s.state==='exact'?'placar exato':s.pts>0?'acertou vencedor':'errou';
      return `<div class="retro-tl ${cls}">
        <div class="tl-j">J${g.jogo}</div>
        <div class="tl-match">${s1||'?'} × ${s2||'?'}</div>
        <div class="tl-scores"><span>real: <b>${realTxt}</b></span><span>seu: <b>${pkTxt}</b></span></div>
        <div class="tl-verdict">${s.pts>0?'+'+s.pts+' pts':'0 pts'} · ${label}</div>
      </div>`;
    }).join("");
    return `<details class="retro-phase-group" open><summary><span style="width:8px;height:8px;background:${phasePalette[ph]};border-radius:2px;display:inline-block;margin-right:8px"></span>${ph}<span style="color:var(--muted);font-weight:400;margin-left:8px">· ${items.length} ${items.length===1?'jogo':'jogos'} · ${byPhase[ph].pts} pts</span></summary><div class="retro-timeline">${cards}</div></details>`;
  }).join("");
  content.innerHTML=`
    <div class="retro-head">
      <div class="retro-whobox">
        <label class="palp-label">Retrospectiva de:</label>
        <div class="palp-whorow">
          <span class="palp-bigname">${p.replace(/_/g," ")}</span>
          <select class="sel" id="retroWho">${opts}</select>
        </div>
      </div>
      <div class="retro-summary">
        <div class="rs-item"><div class="rs-v">${stat.t}</div><div class="rs-k">pontos</div></div>
        <div class="rs-item"><div class="rs-v">${rank}º</div><div class="rs-k">posição atual</div></div>
        <div class="rs-item"><div class="rs-v">${stat.exact}</div><div class="rs-k">exatos</div></div>
        <div class="rs-item"><div class="rs-v">${stat.hits}/${stat.made}</div><div class="rs-k">acertos</div></div>
      </div>
    </div>
    <div class="retro-badges">${badges}</div>
    <div class="retro-section-title">🎨 Pontos por fase</div>
    ${phaseBar}
    <div class="retro-section-title">📆 Jogo a jogo</div>
    ${timelineByPhase}`;
  document.getElementById("retroWho").onchange=e=>{retroWho=e.target.value;retro();};
}

function render(){document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===view));
  document.body.classList.toggle("landing", view==="ranking");
  // move tabs para fora do #content ANTES de re-renderizar (para não serem apagadas)
  const tabs=document.getElementById("tabs");
  const wrap=document.querySelector(".wrap");
  const header=document.getElementById("topHeader");
  if(tabs && header) header.insertAdjacentElement("afterend", tabs);
  // roda a view (isso pode substituir #content e criar tabsSlot)
  if(view==="ranking")ranking();else if(view==="jogos")jogos();else if(view==="stats")stats();else if(view==="bracket")bracket();else if(view==="retro")retro();else palpitar();
  // se estamos no Ranking, agora move as abas para dentro do palco
  if(view==="ranking"){
    const slot=document.getElementById("tabsSlot");
    if(slot && tabs) slot.appendChild(tabs);
  }
}
document.getElementById("tabs").addEventListener("click",e=>{const b=e.target.closest(".tab");if(!b)return;view=b.dataset.view;render();});
document.getElementById("refreshBtn").onclick=fetchResults;
window.addEventListener("resize",()=>{if(view==="stats")stats();});
render();
fetchResults();
setInterval(fetchResults, 120000); // auto-refresh every 2 min
</script>
